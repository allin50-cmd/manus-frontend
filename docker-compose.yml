services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultline
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: vaultline_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultline -d vaultline_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: ["postgres", "-c", "max_connections=50", "-c", "shared_buffers=128MB", "-c", "log_statement=none"]

volumes:
  postgres_data:
