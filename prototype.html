<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UltraCore SheetOps</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

/* ─── Nav ─── */
#topnav { background: #0f172a; color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
#topnav .brand { font-weight: 700; font-size: 15px; letter-spacing: .03em; color: #fff; cursor: pointer; }
#topnav .links { display: flex; gap: 20px; }
#topnav .links a { color: #94a3b8; font-size: 13px; text-decoration: none; cursor: pointer; transition: color .15s; }
#topnav .links a:hover, #topnav .links a.active { color: #fff; font-weight: 500; }
#topnav .user-area { display: flex; gap: 16px; align-items: center; font-size: 12px; color: #94a3b8; }
#topnav .user-area span { cursor: pointer; } #topnav .user-area span:hover { color: #fff; }

#bottomnav { display: none; background: #0f172a; border-top: 1px solid #334155; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; height: 60px; }
#bottomnav .tabs { display: flex; height: 100%; }
#bottomnav .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: #64748b; cursor: pointer; font-size: 10px; border-radius: 8px; margin: 4px 2px; transition: background .15s, color .15s; }
#bottomnav .tab .icon { font-size: 18px; line-height: 1; }
#bottomnav .tab.active { background: #1e293b; color: #fff; font-weight: 600; }
#bottomnav .tab:hover { background: #1e293b; color: #93c5fd; }

#more-menu { display: none; position: fixed; bottom: 64px; left: 12px; right: 12px; background: #1e293b; border-radius: 16px; padding: 12px; z-index: 60; }
#more-menu a { display: block; padding: 12px 16px; color: #e2e8f0; font-size: 14px; border-radius: 8px; cursor: pointer; }
#more-menu a:hover { background: #334155; }
#more-menu .overlay { position: fixed; inset: 0; z-index: -1; }

/* ─── Main ─── */
#main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* ─── Cards ─── */
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; }
.stat-card.red { background: #fef2f2; border-color: #fecaca; }
.stat-card.orange { background: #fff7ed; border-color: #fed7aa; }
.stat-card.blue { background: #eff6ff; border-color: #bfdbfe; }
.stat-card.green { background: #f0fdf4; border-color: #bbf7d0; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
.stat-card.red .stat-num { color: #dc2626; }
.stat-card.orange .stat-num { color: #ea580c; }
.stat-card.blue .stat-num { color: #2563eb; }
.stat-card.green .stat-num { color: #16a34a; }

/* ─── Badges ─── */
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.b-captured { background: #e2e8f0; color: #475569; }
.b-controlled { background: #dbeafe; color: #1d4ed8; }
.b-inprogress { background: #fef3c7; color: #b45309; }
.b-waiting { background: #f3e8ff; color: #7c3aed; }
.b-followupdue { background: #fee2e2; color: #991b1b; }
.b-escalated { background: #fce7f3; color: #be185d; }
.b-decisonneeded { background: #fef3c7; color: #92400e; }
.b-completed { background: #dcfce7; color: #15803d; }
.b-paused { background: #f1f5f9; color: #475569; }
.b-notfit { background: #f1f5f9; color: #94a3b8; }
.b-archived { background: #f1f5f9; color: #94a3b8; }

.pri-low { background: #f1f5f9; color: #475569; }
.pri-medium { background: #dbeafe; color: #1d4ed8; }
.pri-high { background: #ffedd5; color: #c2410c; }
.pri-urgent { background: #fee2e2; color: #b91c1c; }

/* ─── Table ─── */
.table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid #e2e8f0; background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f8fafc; }
td { padding: 10px 12px; vertical-align: middle; }
td a { color: #2563eb; font-weight: 500; cursor: pointer; text-decoration: none; }
td a:hover { text-decoration: underline; }

/* ─── Forms ─── */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; background: #fff; transition: border-color .15s, box-shadow .15s; }
input:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
textarea { min-height: 80px; resize: vertical; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: background .15s, transform .1s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #f1f5f9; color: #334155; }
.btn-secondary:hover { background: #e2e8f0; }
.btn-danger { background: #fef2f2; color: #dc2626; }
.btn-danger:hover { background: #fee2e2; }
.btn-green { background: #f0fdf4; color: #15803d; }
.btn-green:hover { background: #dcfce7; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ─── Misc ─── */
h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
h2 { font-size: 16px; font-weight: 700; color: #1e293b; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.text-muted { color: #64748b; font-size: 13px; }
.text-xs { font-size: 11px; }
.text-sm { font-size: 13px; }
.gap-2 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }
.flex-1 { flex: 1; }
.space-y > * + * { margin-top: 12px; }
.space-y-sm > * + * { margin-top: 8px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; background: #f1f5f9; color: #475569; transition: all .15s; }
.pill.active, .pill:hover { background: #1e293b; color: #fff; }

/* ─── Mobile cards ─── */
.mob-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; }
.mob-card + .mob-card { margin-top: 10px; }

/* ─── Action strip ─── */
.action-strip { background: #f0f9ff; border-left: 3px solid #38bdf8; border-radius: 0 10px 10px 0; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.action-strip span { font-size: 13px; font-weight: 500; color: #0369a1; flex: 1; }

/* ─── Section heading ─── */
.section-head { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; margin-top: 20px; }

/* ─── Login screen ─── */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
.login-logo { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
.login-box input { font-size: 16px; text-align: center; letter-spacing: .2em; margin-bottom: 14px; }
.login-error { color: #dc2626; font-size: 13px; margin-bottom: 10px; }

/* ─── Toast ─── */
#toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ─── Modal ─── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 80; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 600px) { .modal-bg { align-items: center; } }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
@media (min-width: 600px) { .modal { border-radius: 20px; } }
.modal-title { font-size: 17px; font-weight: 700; color: #0f172a; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-title button { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; padding: 0 4px; }

/* ─── Progress bar ─── */
.prog-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: #3b82f6; border-radius: 4px; transition: width .4s; }

/* ─── Alert status ─── */
.del-sent { background: #dbeafe; color: #1d4ed8; }
.del-acked { background: #dcfce7; color: #15803d; }
.del-failed { background: #fee2e2; color: #b91c1c; }
.del-pending { background: #fef3c7; color: #92400e; }
.del-escalated { background: #fce7f3; color: #be185d; }

/* ─── Empty state ─── */
.empty { text-align: center; padding: 48px 24px; }
.empty-icon { width: 56px; height: 56px; background: #f1f5f9; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; }
.empty p { color: #64748b; font-size: 14px; }

/* ─── Responsive ─── */
@media (max-width: 599px) {
  #topnav { display: none; }
  #bottomnav { display: flex; }
  #main { padding: 16px 12px 76px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .hide-mob { display: none !important; }
  .show-mob { display: block !important; }
  h1 { font-size: 20px; }
}
@media (min-width: 600px) {
  .show-mob { display: none !important; }
  .hide-mob { display: block !important; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⊞ SheetOps</div>
    <div class="login-sub">UltraCore Compliance & Work Tracking</div>
    <div id="login-error" class="login-error" style="display:none"></div>
    <input type="password" id="passcode" placeholder="Enter passcode" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign in</button>

</div>

<!-- App shell (hidden until logged in) -->

  <!-- More menu overlay -->
  <div id="more-menu" style="display:none">
    <div class="overlay" onclick="toggleMore()"></div>
    <a onclick="nav('alerts');toggleMore()">Compliance Alerts</a>
    <a onclick="nav('contacts');toggleMore()">Contacts</a>
    <a onclick="nav('teams');toggleMore()">Teams</a>
    <a onclick="nav('recipients');toggleMore()">Alert Recipients</a>
    <a onclick="nav('settings');toggleMore()" style="color:#94a3b8">Settings (George)</a>
    <a onclick="doLogout()" style="color:#f87171">Log out</a>
  </div>

  <div id="main"></div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────

let currentPage = 'dashboard'

  { id:'wi10', type:'DocumentRecord', title:'Client contract — Blue Ocean Services', company:'Blue Ocean Services', owner:'Alissa', status:'Captured', priority:'Low', nextAction:'Send for signing', dueDate:'2026-07-15', decisionNeeded:false, notes:'Contract template customised.' },
]

let decisions = [
  { id:'d1', workItemId:'wi5', question:'Approve referral agreement with FinTech Partners (15% revenue share)?', options:'A) Approve as-is  B) Negotiate to 12%  C) Decline', recommendation:'Recommend Option A — market rate for quality leads', decisionBy:'George', status:'Open', dueDate:'2026-06-18' },
  { id:'d2', workItemId:'wi8', question:'Counter-offer on lease: accept 4% increase or push back to 3%?', options:'A) Accept 4%  B) Counter 3%  C) Explore alternatives', recommendation:'Counter at 3% — landlord motivated to retain us', decisionBy:'George', status:'Open', dueDate:'2026-06-25' },
]

  { id:'c4', company:'Tech Corp', name:'Liam O\'Brien', role:'CEO', email:'liam@techcorp.io', phone:'+44 7700 900300', isPrimary:true },
  { id:'c5', company:'Sunset Retail', name:'Priya Kumar', role:'Director', email:'priya@sunsetretail.co.uk', phone:'+44 7700 900400', isPrimary:true },

]

let deliveries = [
  { id:'del1', workItemId:'wi1', recipient:'Sarah Chen', channel:'Email', status:'Sent', sentAt:'2026-06-10', acked:false },
  { id:'del2', workItemId:'wi2', recipient:'Emma Wilson', channel:'Email', status:'Acknowledged', sentAt:'2026-06-08', acked:true },
  { id:'del3', workItemId:'wi9', recipient:'Sarah Chen', channel:'Email', status:'Failed', sentAt:'2026-06-04', acked:false },
]

let activity = [
  { id:'a1', workItemId:'wi1', person:'Michelle', event:'NoteAdded', summary:'CT600 prepared and reviewed internally', time:'2h ago' },
  { id:'a2', workItemId:'wi4', person:'Dagon', event:'StatusChanged', summary:'Status changed to In Progress', time:'5h ago' },

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function isOverdue(d) { if (!d) return false; return new Date(d) < new Date(new Date().toDateString()); }
function statusBadge(s) {
  const map = {Captured:'b-captured',Controlled:'b-controlled',InProgress:'b-inprogress',Waiting:'b-waiting',FollowUpDue:'b-followupdue',Escalated:'b-escalated',DecisionNeeded:'b-decisonneeded',Completed:'b-completed',Paused:'b-paused',NotFit:'b-notfit',Archived:'b-archived'};
  const labels = {InProgress:'In Progress',FollowUpDue:'Follow-up Due',DecisionNeeded:'Decision Needed',NotFit:'Not Fit'};
  return `<span class="badge ${map[s]||'b-captured'}">${labels[s]||s}</span>`;
}
function priBadge(p) {
  const map = {Low:'pri-low',Medium:'pri-medium',High:'pri-high',Urgent:'pri-urgent'};
  return `<span class="badge ${map[p]||'pri-low'}">${p}</span>`;
}
function delBadge(s) {
  const map = {Sent:'del-sent',Acknowledged:'del-acked',Failed:'del-failed',Pending:'del-pending',Escalated:'del-escalated'};
  return `<span class="badge ${map[s]||'del-pending'}">${s}</span>`;
}
function typeLabel(t) {
  const m = {ComplianceAlert:'Compliance',InternalTask:'Task',Partnership:'Partnership',Operations:'Ops',TechTask:'Tech',DocumentRecord:'Doc',Other:'Other',ConstructionLead:'Construction',PlanningLead:'Planning',MediaBrief:'Media'};
  return m[t]||t;
}
function toast(msg, dur=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function closeModal() { const m = document.getElementById('modal'); if(m) m.remove(); modalOpen=false; }
function showModal(html) {
  closeModal();
  const m = document.createElement('div');
  m.id = 'modal'; m.className = 'modal-bg';
  m.innerHTML = `<div class="modal">${html}</div>`;
  m.addEventListener('click', e => { if(e.target===m) closeModal(); });
  document.body.appendChild(m);
  modalOpen = true;
}

// ─────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────
function doLogin() {
  const v = document.getElementById('passcode').value;
  if (v === DEMO_PASSCODE) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    nav('dashboard');
  } else {
    const el = document.getElementById('login-error');
    el.textContent = 'Incorrect passcode'; el.style.display = 'block';
  }
}
document.getElementById('passcode').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('passcode').value = '';
}

function nav(page, params={}) {
  currentPage = page;
  toggleMore(false);
  // update nav active states
  document.querySelectorAll('[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const main = document.getElementById('main');
  const renders = {
    dashboard: renderDashboard, 'work-items': renderWorkItems,
    today: renderToday, decisions: renderDecisions,
    alerts: renderAlerts, contacts: renderContacts,
    teams: renderTeams, recipients: renderRecipients,
    settings: renderSettings,
  };
  if (page === 'work-item-detail') { main.innerHTML = renderWorkItemDetail(params.id); return; }
  if (page === 'new-work-item') { main.innerHTML = renderNewWorkItem(); return; }
  if (renders[page]) main.innerHTML = renders[page]();
  else main.innerHTML = `<h1>${page}</h1>`;
  window.scrollTo(0,0);
}

function toggleMore(force) {
  const m = document.getElementById('more-menu');
  const show = force !== undefined ? force : m.style.display === 'none';
  m.style.display = show ? 'block' : 'none';
}

function createWorkItem() {
  const title = document.getElementById('nw-title').value.trim();
  if (!title) { toast('Title is required'); return; }
  const id = 'wi'+Date.now();
  workItems.unshift({
    id, type: document.getElementById('nw-type').value,
    title, company: document.getElementById('nw-company').value.trim()||null,
    owner: document.getElementById('nw-owner').value,
    status: 'Captured', priority: document.getElementById('nw-priority').value,
    nextAction: document.getElementById('nw-action').value.trim()||null,
    dueDate: document.getElementById('nw-due').value||null,
    decisionNeeded: false,
    notes: document.getElementById('nw-notes').value.trim()||null,
  });
  activity.unshift({ id:'a'+Date.now(), workItemId:id, person:'George', event:'Created', summary:'Work item created', time:'Just now' });
  toast('Work item created ✓');
  nav('work-item-detail',{id});
}

function openEscalate(wid) {
  showModal(`
  <div class="modal-title">Escalate for Decision <button onclick="closeModal()">×</button></div>
  <div class="form-group"><label>Question *</label><input id="esc-q" placeholder="What decision is needed?"></div>
  <div class="form-group"><label>Options</label><input id="esc-opts" placeholder="A) … B) … C) …"></div>
  <div class="form-group"><label>Recommendation</label><input id="esc-rec" placeholder="Your recommendation"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-danger" onclick="escalateItem('${wid}')">Escalate</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  </div>`);
}
function escalateItem(wid) {
  const q = document.getElementById('esc-q').value.trim();
  if (!q) { toast('Question is required'); return; }
  const w = workItems.find(x=>x.id===wid);
  w.status = 'Escalated'; w.decisionNeeded = true;
  decisions.push({ id:'d'+Date.now(), workItemId:wid, question:q, options:document.getElementById('esc-opts').value.trim()||null, recommendation:document.getElementById('esc-rec').value.trim()||null, decisionBy:'George', status:'Open', dueDate:null });
  activity.unshift({ id:'a'+Date.now(), workItemId:wid, person:'George', event:'DecisionRequested', summary:`Escalated: ${q}`, time:'Just now' });
  closeModal(); toast('Escalated to George ✓'); nav('work-item-detail',{id:wid});
}

function resolveDecision(did, status) {
  const d = decisions.find(x=>x.id===did);
  if (!d) return;
  d.status = status;
  const w = workItems.find(x=>x.id===d.workItemId);
  if (w) { w.decisionNeeded = false; if (!['Completed','Archived'].includes(w.status)) w.status = 'InProgress'; }
  activity.unshift({ id:'a'+Date.now(), workItemId:d.workItemId, person:'George', event:'DecisionMade', summary:`Decision: ${status}`, time:'Just now' });
  toast(`Decision: ${status} ✓`);
  if (currentPage==='decisions') nav('decisions');
  else nav('work-item-detail',{id:d.workItemId});
}

function retryDelivery(did) {
  const d = deliveries.find(x=>x.id===did);
  if (d) { d.status='Pending'; toast('Retry queued ✓'); nav('work-item-detail',{id:d.workItemId}); }
}
function ackDelivery(did) {
  const d = deliveries.find(x=>x.id===did);
  if (d) { d.status='Acknowledged'; toast('Acknowledged ✓'); nav('work-item-detail',{id:d.workItemId}); }
}

function suppressRecipient(rid) {
  const r = recipients.find(x=>x.id===rid);
  if (!r) return;
  const reason = prompt('Suppression reason (optional):');
  if (reason === null) return;
  r.suppressed = true;
  toast(`${r.name} suppressed`);
  nav('recipients');
}
function unsuppressRecipient(rid) {
  const r = recipients.find(x=>x.id===rid);
  if (r) { r.suppressed=false; toast(`${r.name} unsuppressed`); nav('recipients'); }
}

  <div class="form-group"><label>Title *</label><input id="na-title" placeholder="e.g. Corporation Tax — Acme Ltd CT600"></div>
  <div class="form-group"><label>Company *</label><input id="na-company" placeholder="Client company name"></div>
  <div class="form-group"><label>Priority</label>
    <select id="na-pri"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select>
  </div>
  <div class="form-group"><label>Due Date</label><input id="na-due" type="date"></div>
  <div class="form-group"><label>Notes</label><textarea id="na-notes" placeholder="Details, reference numbers…" style="min-height:80px"></textarea></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="createAlert()">Create alert</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  </div>`);
}
function createAlert() {
  const title = document.getElementById('na-title').value.trim();
  const company = document.getElementById('na-company').value.trim();
  if (!title||!company) { toast('Title and company required'); return; }
  const id = 'wi'+Date.now();
  workItems.unshift({ id, type:'ComplianceAlert', title, company, owner:'Michelle', status:'Captured', priority:document.getElementById('na-pri').value, nextAction:null, dueDate:document.getElementById('na-due').value||null, decisionNeeded:false, notes:document.getElementById('na-notes').value.trim()||null });
  closeModal(); toast('Alert created ✓'); nav('alerts');
}

function changePassword() {
  const cur = document.getElementById('cur-pass').value;
  const nw = document.getElementById('new-pass').value;
  const cf = document.getElementById('conf-pass').value;
  if (!cur||!nw||!cf) { toast('All fields required'); return; }
  if (nw.length<8) { toast('New password must be 8+ characters'); return; }
  if (nw!==cf) { toast('Passwords do not match'); return; }
  toast('Password updated ✓');
  document.getElementById('cur-pass').value=''; document.getElementById('new-pass').value=''; document.getElementById('conf-pass').value='';
}
</script>
</body>
</html>
