<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FineGuard Pro — Companies House Monitoring</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c2340;--blue:#1d4ed8;--blue-lt:#3b82f6;--blue-xlt:#dbeafe;
  --bg:#eff6ff;--white:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --green:#16a34a;--green-lt:#dcfce7;--green-dot:#22c55e;
  --amber:#d97706;--amber-lt:#fef3c7;--orange:#ea580c;--orange-lt:#ffedd5;
  --red:#dc2626;--red-lt:#fee2e2;--purple:#7c3aed;--purple-lt:#f5f3ff;
  --nav-h:56px;--bottom-h:66px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a,button{cursor:pointer;-webkit-tap-highlight-color:transparent}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--navy);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:50}
.tb-logo{width:32px;height:32px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tb-brand{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px}
.tb-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:400}
.tb-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;cursor:pointer}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);background:var(--white);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--muted);font-weight:500;padding:8px 2px 6px;border:none;background:none;position:relative;transition:color .15s}
.bn-icon{font-size:19px;line-height:1}
.bn-tab.active{color:var(--blue)}
.bn-dot{position:absolute;top:7px;right:calc(50% - 16px);width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--white)}
#main{margin-top:var(--nav-h);padding:14px 12px calc(var(--bottom-h)+16px);max-width:540px;margin-left:auto;margin-right:auto}
.section{display:none}.section.active{display:block}
.card{background:var(--white);border-radius:16px;box-shadow:0 1px 4px rgba(15,23,42,.08);overflow:hidden;margin-bottom:12px;border:1px solid var(--border)}
.card-pad{padding:16px}
.card-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hd-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.chlink{font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;border:none;background:none}
.page-hd{margin-bottom:14px}
.page-hd h1{font-size:22px;font-weight:800;line-height:1.2}
.page-hd p{font-size:13px;color:var(--muted);margin-top:3px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{border-radius:14px;padding:14px;border:1px solid}
.stat-n{font-size:28px;font-weight:800}
.stat-l{font-size:11px;font-weight:500;margin-top:3px;opacity:.85}
.urgent-banner{display:flex;align-items:center;gap:12px;background:var(--red);color:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;cursor:pointer}
.urgent-banner:active{opacity:.9}
.ub-body{flex:1}
.ub-title{font-size:14px;font-weight:700}
.ub-sub{font-size:11px;opacity:.8;margin-top:2px}
/* Deadline row */
.dl-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.dl-row:last-child{border-bottom:none}
.dl-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.dl-body{flex:1;min-width:0}
.dl-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-sub{font-size:11px;color:var(--muted);margin-top:1px}
.dl-right{text-align:right;flex-shrink:0}
.dl-days{font-size:13px;font-weight:800}
.dl-due{font-size:10px;font-weight:600;margin-top:1px}
/* Company card */
.co-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.co-card:active{box-shadow:0 4px 12px rgba(15,23,42,.1)}
.co-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.co-avatar{width:44px;height:44px;border-radius:12px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
.co-name{font-size:15px;font-weight:800;line-height:1.2}
.co-ch{font-size:11px;color:var(--muted);margin-top:2px;font-family:monospace}
.co-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.co-stat{border-radius:10px;padding:10px;text-align:center;background:var(--bg)}
.co-stat-n{font-size:18px;font-weight:800}
.co-stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.co-next{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.co-actions{display:flex;gap:8px}
/* Deadline card (full) */
.fc{background:var(--white);border-radius:12px;border:1px solid var(--border);border-left-width:4px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.fc:active{opacity:.85}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:14px;font-weight:700;margin-bottom:3px}
.fc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.fc-right{text-align:right;flex-shrink:0}
.fc-days{font-size:16px;font-weight:800}
.fc-date{font-size:11px;color:var(--muted);margin-top:2px}
/* Alert row */
.al-row{display:flex;align-items:flex-start;gap:10px;padding:13px;border-bottom:1px solid var(--border)}
.al-row:last-child{border-bottom:none}
.al-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.al-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.al-body{flex:1;min-width:0}
.al-title{font-size:13px;font-weight:700;margin-bottom:2px}
.al-meta{font-size:11px;color:var(--muted);margin-top:2px}
/* Recipient row */
.rc-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.rc-row:last-child{border-bottom:none}
.rc-av{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.rc-body{flex:1;min-width:0}
.rc-name{font-size:13px;font-weight:700}
.rc-detail{font-size:11px;color:var(--muted);margin-top:2px}
/* Timeline */
.tl-item{display:flex;gap:10px;margin-bottom:14px}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-line{width:2px;flex:1;background:var(--border);margin:4px auto}
.tl-content{flex:1;padding-bottom:4px}
.tl-date{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tl-title{font-size:13px;font-weight:600}
.tl-sub{font-size:11px;color:var(--muted);margin-top:1px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-lt);color:var(--green)}
.b-amber{background:var(--amber-lt);color:var(--amber)}
.b-orange{background:var(--orange-lt);color:var(--orange)}
.b-red{background:var(--red-lt);color:var(--red)}
.b-blue{background:var(--blue-xlt);color:var(--blue)}
.b-gray{background:#f1f5f9;color:var(--muted)}
.b-navy{background:var(--navy);color:#fff}
/* Pills / filter */
.pills{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;background:var(--white);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%;justify-content:center;margin-bottom:8px}
/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--white);color:var(--text);-webkit-appearance:none;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group textarea{resize:vertical;min-height:72px;line-height:1.5}
/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:#fff;outline:none}
.search-wrap input:focus{border-color:var(--blue)}
/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;border-radius:12px;background:var(--border);transition:.2s;cursor:pointer}
.slider:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.2s}
.toggle input:checked+.slider{background:var(--blue)}
.toggle input:checked+.slider:before{transform:translateX(20px)}
/* Toast */
#toast{position:fixed;bottom:calc(var(--bottom-h)+12px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hd h3{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.empty-state{background:#fff;border-radius:16px;padding:48px 20px;text-align:center;border:1px solid var(--border)}
.es-icon{font-size:48px;margin-bottom:12px}
.es-title{font-size:17px;font-weight:700;margin-bottom:6px}
.es-sub{font-size:13px;color:var(--muted)}
</style>
</head>

function loadState() {

  psc:          {label:'PSC Change',           short:'PSC',      icon:'🔑', color:'var(--amber)',  bg:'var(--amber-lt)',    badge:'b-amber'},
  'reg-office': {label:'Registered Office',   short:'Reg. Office',icon:'📍',color:'var(--orange)','bg':'var(--orange-lt)', badge:'b-orange'},
}
var STATUS_INFO = {
  overdue:  {label:'Overdue',     badge:'b-red',    border:'var(--red)',       color:'var(--red)'},
  'due-soon':{label:'Due Soon',   badge:'b-orange',  border:'var(--orange)',    color:'var(--orange)'},
  upcoming: {label:'Upcoming',    badge:'b-amber',  border:'var(--amber)',     color:'var(--amber)'},
  ok:       {label:'On Track',    badge:'b-green',  border:'var(--green-dot)', color:'var(--green)'},
  done:     {label:'Filed',       badge:'b-gray',   border:'var(--border)',    color:'var(--muted)'},
}
var ALERT_TYPE_LABEL = {'overdue':'Overdue Notice','90-day':'90-Day Reminder','60-day':'60-Day Reminder','30-day':'30-Day Reminder','14-day':'14-Day Reminder','7-day':'7-Day Reminder','1-day':'Final Reminder'}
var CHANNEL_ICON = {email:'✉️', sms:'💬', whatsapp:'📱'}
var STATUS_ORDER = {overdue:0,'due-soon':1,upcoming:2,ok:3,done:4}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return 'x'+Math.random().toString(36).slice(2,8)+Date.now().toString(36) }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) }
function fmtShort(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) }
function fmtDateTime(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) }
function daysUntil(d) { if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000) }
function daysLabel(d) {
  var n = daysUntil(d)
  if (n===null) return {text:'—',color:'var(--muted)'}
  if (n<0) return {text:Math.abs(n)+'d overdue',color:'var(--red)'}
  if (n===0) return {text:'Due today',color:'var(--red)'}
  if (n===1) return {text:'1 day',color:'var(--orange)'}
  if (n<=7) return {text:n+' days',color:'var(--orange)'}
  if (n<=30) return {text:n+' days',color:'var(--amber)'}
  return {text:n+' days',color:'var(--muted)'}
}
function coName(id) { var c=state.companies.find(function(x){return x.id===id}); return c?c.name:'Unknown' }
function computeCoStatus(coId) {
  var dls = state.deadlines.filter(function(d){return d.companyId===coId&&d.status!=='done'})
  if (dls.some(function(d){return d.status==='overdue'})) return 'overdue'
  if (dls.some(function(d){return d.status==='due-soon'})) return 'due-soon'
  if (dls.some(function(d){return d.status==='upcoming'})) return 'upcoming'
  return 'compliant'
}
function activeDls(coId) { return state.deadlines.filter(function(d){return d.companyId===coId&&d.status!=='done'}) }

var toastTimer
function toast(msg) {
  clearTimeout(toastTimer)
  var t=document.getElementById('toast')
  t.textContent='✓ '+msg; t.classList.add('show')
  toastTimer=setTimeout(function(){t.classList.remove('show')},2400)
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')})
  document.querySelectorAll('.bn-tab').forEach(function(t){t.classList.remove('active')})
  var sec=document.getElementById('s-'+name), tab=document.getElementById('tab-'+name)
  if(sec) sec.classList.add('active')
  if(tab) tab.classList.add('active')
  window.scrollTo(0,0); ui.section=name
  var fn={dashboard:renderDashboard,companies:renderCompanies,deadlines:renderDeadlines,alerts:renderAlerts,settings:renderSettings}
  if(fn[name]) fn[name]()
}

function updateTopBar() {
  var overdue = state.deadlines.filter(function(d){return d.status==='overdue'}).length

  if(badge){badge.style.display=overdue>0?'':'none'; badge.textContent=overdue+' overdue'}
  if(dot) dot.style.display=overdue>0?'':'none'

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

    atRisk.forEach(function(c,i){
      var st = computeCoStatus(c.id)

      var nextDl = state.deadlines.filter(function(d){return d.companyId===c.id&&d.status!=='done'}).sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate)})[0]
      h += '<div class="dl-row" style="'+(i===atRisk.length-1?'border-bottom:none':'')+'" onclick="openCompanyModal(\''+c.id+'\')">'
      h += '<div class="dl-icon" style="background:var(--bg);font-size:20px;font-weight:800;color:var(--navy)">'+c.name[0]+'</div>'

  document.getElementById('s-dashboard').innerHTML = h

function statBox(n,label,bg,border,color) {
  return '<div class="stat-box" style="background:'+bg+';border-color:'+border+'"><div class="stat-n" style="color:'+color+'">'+n+'</div><div class="stat-l" style="color:'+color+'">'+label+'</div></div>'

// ── COMPANIES ─────────────────────────────────────────────────────────────────
function renderCompanies() {

  // Update computed statuses
  state.companies.forEach(function(c){ c.status = computeCoStatus(c.id) })

  var list = state.companies.filter(function(c){
    if (!search) return true
    return c.name.toLowerCase().includes(search)||c.ch.includes(search)||(c.sicDesc||'').toLowerCase().includes(search)
  }).sort(function(a,b){
    return (STATUS_ORDER[a.status]||99)-(STATUS_ORDER[b.status]||99)
  })

  state.companies.forEach(function(c){
    if(c.status==='overdue') overdueCount++
    else if(c.status==='due-soon'||c.status==='upcoming') atRisk++
    else compliant++

  var h = '<div class="page-hd"><h1>Portfolio</h1><p>'+state.companies.length+' companies · '+overdueCount+' overdue · '+compliant+' compliant</p></div>'

  h += '<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:#f87171">'+(overdueCount+atRisk)+'</div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.5;margin-top:2px">Attention</div></div>'

      h += '<div class="co-card" onclick="openCompanyModal(\''+c.id+'\')">'

// ── DEADLINES ─────────────────────────────────────────────────────────────────
function renderDeadlines() {
  var search = ui.dlSearch.toLowerCase().trim()
  var filter = ui.dlFilter

  var overdueCnt   = state.deadlines.filter(function(d){return d.status==='overdue'}).length
  var dueSoonCnt   = state.deadlines.filter(function(d){return d.status==='due-soon'}).length
  var upcomingCnt  = state.deadlines.filter(function(d){return d.status==='upcoming'}).length
  var doneCnt      = state.deadlines.filter(function(d){return d.status==='done'}).length

  var filtered = state.deadlines.filter(function(d){
    if (filter==='done') return d.status==='done'
    if (filter==='accounts') return d.type==='accounts'&&d.status!=='done'
    if (filter==='confirmation') return d.type==='confirmation'&&d.status!=='done'
    if (filter==='director') return (d.type==='director'||d.type==='psc')&&d.status!=='done'
    if (filter==='overdue') return d.status==='overdue'
    if (filter!=='all' && d.status!==filter && filter!=='accounts' && filter!=='confirmation' && filter!=='director') return false
    if (filter==='all' && d.status==='done') return false
    var name = coName(d.companyId).toLowerCase()
    if (search && !name.includes(search) && !((TYPE_INFO[d.type]||{}).label||'').toLowerCase().includes(search) && !d.ref.toLowerCase().includes(search)) return false
    return true
  }).sort(function(a,b){
    var so = (STATUS_ORDER[a.status]||99)-(STATUS_ORDER[b.status]||99)
    return so!==0 ? so : new Date(a.dueDate)-new Date(b.dueDate)
  })

  var active = state.deadlines.filter(function(d){return d.status!=='done'}).length
  var h = ''
  h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px">'
  h += '<div class="page-hd" style="margin-bottom:0"><h1>Deadlines</h1><p>'+active+' active · '+doneCnt+' filed</p></div>'
  h += '<button class="btn btn-sm" style="background:var(--navy);color:#fff;flex-shrink:0;margin-top:4px" onclick="openAddDeadline(null)">+ Add</button>'
  h += '</div>'

  // Summary tiles
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">'
  h += dlTile('overdue',overdueCnt,'var(--red)','var(--red-lt)','#fca5a5','Overdue')
  h += dlTile('due-soon',dueSoonCnt,'var(--orange)','#fff7ed','#fed7aa','Due Soon')
  h += dlTile('upcoming',upcomingCnt,'var(--amber)','#fefce8','#fde68a','Upcoming')
  h += dlTile('done',doneCnt,'var(--green)','var(--green-lt)','#86efac','Filed')
  h += '</div>'

  // Search
  h += '<div class="search-wrap"><input type="search" id="dlsearch" placeholder="🔍  Search company name, filing type…" value="'+esc(ui.dlSearch)+'" oninput="onDlSearch(this.value)"></div>'

  // Filter pills
  h += '<div class="pills">'
  h += dlPill('all','All ('+active+')')
  h += dlPill('overdue','🔴 Overdue')
  h += dlPill('due-soon','⚠ Due Soon')
  h += dlPill('accounts','📋 Accounts')
  h += dlPill('confirmation','✅ Conf. Statement')
  h += dlPill('director','👤 Director/PSC')
  h += dlPill('done','✓ Filed')
  h += '</div>'

  if (filtered.length === 0) {
    h += '<div class="empty-state"><div class="es-icon">📅</div><div class="es-title">No deadlines found</div><div class="es-sub">Try a different filter</div></div>'
  } else {
    filtered.forEach(function(dl){
      var ti = TYPE_INFO[dl.type]||TYPE_INFO.accounts
      var si = STATUS_INFO[dl.status]||STATUS_INFO.ok
      var dl_label = daysLabel(dl.dueDate)
      h += '<div class="fc" style="border-left-color:'+si.border+(dl.status==='done'?';opacity:.65':'')+';" onclick="openDeadlineModal(\''+dl.id+'\')">'
      h += '<div class="fc-body">'
      h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:16px">'+ti.icon+'</span><div class="fc-title">'+ti.label+'</div></div>'
      h += '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">'+esc(coName(dl.companyId))+'</div>'
      h += '<div class="fc-meta"><span class="badge b-gray">'+dl.ref+'</span><span class="badge '+si.badge+'">'+si.label+'</span></div>'
      h += '</div>'
      h += '<div class="fc-right">'
      h += '<div class="fc-days" style="color:'+dl_label.color+'">'+dl_label.text+'</div>'
      h += '<div class="fc-date">'+fmtShort(dl.dueDate)+'</div>'
      if (dl.status==='done'&&dl.filedAt) h += '<div style="font-size:10px;color:var(--green);font-weight:600;margin-top:2px">Filed ✓</div>'
      h += '</div></div>'
    })
  }

  document.getElementById('s-deadlines').innerHTML = h
  if (ui.dlSearch) {
    var inp = document.getElementById('dlsearch')
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length) }
  }
}

function dlTile(f,n,color,bg,border,label) {
  var active = ui.dlFilter===f
  return '<div onclick="setDlFilter(\''+f+'\')" style="background:'+bg+';border:'+(active?'2px solid var(--navy)':'1px solid '+border)+';border-radius:12px;padding:10px;text-align:center;cursor:pointer">'
    +'<div style="font-size:20px;font-weight:800;color:'+color+'">'+n+'</div>'
    +'<div style="font-size:10px;font-weight:600;color:'+color+';margin-top:2px">'+label+'</div>'
    +'</div>'
}
function dlPill(f,label) { return '<button class="pill'+(ui.dlFilter===f?' active':'')+'" onclick="setDlFilter(\''+f+'\')">'+label+'</button>' }

// ── ALERTS ────────────────────────────────────────────────────────────────────
function renderAlerts() {
  var filter = ui.alFilter
  var sentCnt   = state.alerts.filter(function(a){return a.status==='sent'}).length
  var failedCnt = state.alerts.filter(function(a){return a.status==='failed'}).length
  var filtered  = state.alerts.filter(function(a){
    if (filter==='sent') return a.status==='sent'
    if (filter==='failed') return a.status==='failed'
    if (filter==='email') return a.channel==='email'
    if (filter==='sms') return a.channel==='sms'
    return true
  }).sort(function(a,b){return new Date(b.sentAt)-new Date(a.sentAt)})

  var h = '<div class="page-hd"><h1>Alert History</h1><p>'+sentCnt+' sent · '+failedCnt+' failed</p></div>'

  // Summary
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'
  h += '<div style="background:var(--green-lt);border:1px solid #86efac;border-radius:14px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--green)">'+sentCnt+'</div><div style="font-size:11px;font-weight:600;color:var(--green);margin-top:2px">Sent</div></div>'
  h += '<div style="background:var(--red-lt);border:1px solid #fca5a5;border-radius:14px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--red)">'+failedCnt+'</div><div style="font-size:11px;font-weight:600;color:var(--red);margin-top:2px">Failed</div></div>'
  h += '<div style="background:var(--blue-xlt);border:1px solid #93c5fd;border-radius:14px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--blue)">'+state.alerts.length+'</div><div style="font-size:11px;font-weight:600;color:var(--blue);margin-top:2px">Total</div></div>'
  h += '</div>'

  // Filter pills
  h += '<div class="pills">'
  h += alPill('all','All')
  h += alPill('sent','✓ Sent')
  h += alPill('failed','✗ Failed')
  h += alPill('email','✉️ Email')
  h += alPill('sms','💬 SMS')
  h += '</div>'

  h += '<div class="card">'
  if (filtered.length === 0) {
    h += '<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">No alerts in this filter</div>'
  } else {
    filtered.forEach(function(al){
      var isSent = al.status==='sent'
      var chIcon = CHANNEL_ICON[al.channel]||'📡'
      var typeLabel = ALERT_TYPE_LABEL[al.type]||al.type
      h += '<div class="al-row">'
      h += '<div class="al-dot" style="background:'+(isSent?'var(--green)':'var(--red)')+'"></div>'
      h += '<div class="al-icon" style="background:'+(isSent?'var(--green-lt)':'var(--red-lt)')+'">'+chIcon+'</div>'
      h += '<div class="al-body">'
      h += '<div class="al-title">'+esc(coName(al.companyId))+'</div>'
      h += '<div style="font-size:12px;color:var(--muted);margin-top:1px">'+esc(al.subject)+'</div>'
      h += '<div class="al-meta">'+fmtDateTime(al.sentAt)+' · '+typeLabel+' · <span class="badge '+(isSent?'b-green':'b-red')+'">'+esc(al.status)+'</span></div>'
      h += '<div style="font-size:11px;color:var(--muted);margin-top:3px">To: '+esc(al.recipient)+'</div>'
      h += '</div></div>'
    })
  }
  h += '</div>'
  document.getElementById('s-alerts').innerHTML = h
}
function alPill(f,label) { return '<button class="pill'+(ui.alFilter===f?' active':'')+'" onclick="setAlFilter(\''+f+'\')">'+label+'</button>' }

// ── SETTINGS ──────────────────────────────────────────────────────────────────

  h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">'
  ;[90,60,30,14,7,1].forEach(function(n){
    var active = s.alertDays.includes(n)
    h += '<button onclick="toggleAlertDay('+n+')" style="padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;border:2px solid '+(active?'var(--blue)':'var(--border)')+';background:'+(active?'var(--blue)':'#fff')+';color:'+(active?'#fff':'var(--muted)')+';cursor:pointer">'+n+' days</button>'

  h += '<div class="card card-pad" style="margin-bottom:12px">'
  h += '<div class="card-hd" style="margin:-16px -16px 14px;border-radius:0"><span class="card-hd-title">Alert Channels</span></div>'
  ;[['email','✉️ Email'],['sms','💬 SMS'],['whatsapp','📱 WhatsApp']].forEach(function(ch){
    h += '<div class="toggle-row"><div><div style="font-size:14px;font-weight:600">'+ch[1]+'</div><div style="font-size:12px;color:var(--muted)">'+( ch[0]==='email'?'Deadline reminders by email':ch[0]==='sms'?'Text message alerts':' Coming soon')+'</div></div>'
    h += '<label class="toggle"><input type="checkbox" '+(s.channels[ch[0]]?'checked':'')+' onchange="toggleChannel(\''+ch[0]+'\')"><span class="slider"></span></label></div>'
  })
  h += '</div>'

  // Recipients
  h += '<div class="card" style="margin-bottom:12px">'

    h += '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No recipients configured</div>'
  } else {
    state.recipients.forEach(function(r){
      h += '<div class="rc-row">'
      h += '<div class="rc-av">'+r.name[0]+'</div>'
      h += '<div class="rc-body"><div class="rc-name">'+esc(r.name)+(r.companyId==='all'?' <span class="badge b-navy" style="font-size:9px;padding:1px 6px">All companies</span>':'')+'</div>'
      h += '<div class="rc-detail">'+(r.email?'✉️ '+esc(r.email):'')+''+(r.phone?' · 💬 '+esc(r.phone):'')+'</div>'
      h += '<div style="display:flex;gap:4px;margin-top:4px">'+r.channels.map(function(ch){return '<span class="badge b-gray">'+CHANNEL_ICON[ch]+' '+ch+'</span>'}).join('')+'</div>'
      h += '</div>'

      h += '</div>'
    })
  }
  h += '</div></div>'

  h += settingsRow('Billing','£'+state.companies.length+'/mo (£1 per company monitored)')
  h += settingsRow('Email','george@firm.co.uk')
  h += '</div>'

  h += '<button class="btn btn-danger btn-full" style="margin-top:4px" onclick="if(confirm(\'Reset demo data?\'))resetData()">↺ Reset Demo Data</button>'

  document.getElementById('s-settings').innerHTML = h
}

function settingsRow(k,v) {
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;font-weight:600;color:var(--muted)">'+k+'</span><span style="font-size:13px;font-weight:600">'+v+'</span></div>'
}

function toggleAlertDay(n) {
  var idx = state.settings.alertDays.indexOf(n)
  if (idx>=0) state.settings.alertDays.splice(idx,1); else state.settings.alertDays.push(n)
  saveState(); renderSettings()
}
function toggleChannel(ch) {
  state.settings.channels[ch] = !state.settings.channels[ch]
  saveState(); renderSettings()
}

  var refMap = {accounts:'AA',confirmation:'CS01',director:'AP01',psc:'PSC04','reg-office':'AD01'}
  var inp = document.getElementById('ad-ref')
  if (inp) inp.value = refMap[sel.value]||''
}

function submitDeadline() {
  var coId = (document.getElementById('ad-co')||{}).value||''
  var type = (document.getElementById('ad-type')||{}).value||'accounts'
  var due = (document.getElementById('ad-due')||{}).value||''
  if (!due) { toast('Due date is required'); return }
  var ref = (document.getElementById('ad-ref')||{}).value||''
  var notes = (document.getElementById('ad-notes')||{}).value||''
  var n = daysUntil(due)
  var status = n<0?'overdue':n<=30?'due-soon':n<=90?'upcoming':'ok'
  state.deadlines.push({id:uid(),companyId:coId,type:type,dueDate:due,status:status,filedAt:null,ref:ref.trim()||type,notes:notes.trim()})
  saveState()
  document.querySelector('.modal-bg').remove()
  toast('Deadline added')
  renderDeadlines(); renderDashboard(); renderCompanies(); updateTopBar()
}

function submitRecipient() {
  var name = (document.getElementById('nr-name')||{}).value||''

  var email = (document.getElementById('nr-email')||{}).value||''
  var phone = (document.getElementById('nr-phone')||{}).value||''

    +'</div>'
    +'<div style="background:var(--blue-xlt);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">'
    +'<div style="font-size:22px;font-weight:800;color:var(--blue)">£'+state.companies.length+'<span style="font-size:14px;font-weight:600">/mo</span></div>'
    +'<div style="font-size:12px;color:var(--blue);margin-top:4px">'+state.companies.length+' companies × £1 per company</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">'
    +setRow('⚙️','Full Settings',"this.closest('.modal-bg').remove();showSection('settings')")
    +setRow('📊','Export Data','exportData()')
    +setRow('↺','Reset Demo Data',"this.closest('.modal-bg').remove();if(confirm('Reset all data?'))resetData()",'var(--red)')
    +'</div>'
    +'<button class="btn btn-danger btn-full" onclick="this.closest(\'.modal-bg\').remove();toast(\'Signed out — prototype only\')">Sign Out</button>'
  document.body.appendChild(m)
}
function setRow(icon,label,action,color){
  return '<div onclick="'+action+'" style="padding:14px;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center"><span style="'+(color?'color:'+color:'')+'">'+icon+' '+label+'</span><span style="color:var(--muted)">›</span></div>'
}

// ── Actions ───────────────────────────────────────────────────────────────────
function markFiled(id) {
  var dl = state.deadlines.find(function(d){return d.id===id})
  if (dl) { dl.status='done'; dl.filedAt=new Date().toISOString(); saveState() }
  state.companies.forEach(function(c){ c.status=computeCoStatus(c.id) })
  saveState(); toast('Marked as filed ✅')
  renderDeadlines(); renderDashboard(); renderCompanies(); updateTopBar()
}

function deleteDeadline(id) {
  if (!confirm('Delete this deadline?')) return
  state.deadlines = state.deadlines.filter(function(d){return d.id!==id})
  saveState(); toast('Deadline deleted')
  renderDeadlines(); renderDashboard(); renderCompanies(); updateTopBar()
}

function deleteCompany(id) {
  if (!confirm('Remove this company and all its deadlines?')) return
  state.companies = state.companies.filter(function(c){return c.id!==id})
  state.deadlines = state.deadlines.filter(function(d){return d.companyId!==id})
  state.alerts = state.alerts.filter(function(a){return a.companyId!==id})
  saveState(); toast('Company removed')
  renderCompanies(); renderDashboard(); updateTopBar()
}

function deleteRecipient(id) {
  if (!confirm('Remove this recipient?')) return
  state.recipients = state.recipients.filter(function(r){return r.id!==id})
  saveState(); renderSettings(); toast('Recipient removed')
}

function sendTestAlert(dlId) {
  var dl = state.deadlines.find(function(d){return d.id===dlId})
  if (!dl) return
  var ti = TYPE_INFO[dl.type]||TYPE_INFO.accounts
  var newAlert = {id:uid(),companyId:dl.companyId,deadlineId:dlId,type:'manual',channel:'email',status:'sent',recipient:'george@firm.co.uk',sentAt:new Date().toISOString(),subject:'Manual alert: '+ti.label+' — '+coName(dl.companyId)}
  state.alerts.unshift(newAlert)
  saveState(); toast('Alert sent to george@firm.co.uk')
}

function exportData() {
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'})
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='fineguard-export.json'; a.click()
  toast('Data exported')
}

function resetData() {
  localStorage.removeItem('fgpro'); state=clone(DEFAULT)
  ui.dlFilter='all'; ui.dlSearch=''; ui.alFilter='all'; ui.coSearch=''
  renderAll(); toast('Demo data restored')
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setDlFilter(f) { ui.dlFilter=f; ui.dlSearch=''; renderDeadlines() }
function onDlSearch(v) { ui.dlSearch=v; ui.dlFilter='all'; renderDeadlines() }
function setAlFilter(f) { ui.alFilter=f; renderAlerts() }
function onCoSearch(v) { ui.coSearch=v; renderCompanies() }
function filterDl(f) { ui.dlFilter=f; ui.dlSearch=''; showSection('deadlines') }
function filterDlByCompany(coId) {
  ui.dlSearch = coName(coId)
  ui.dlFilter = 'all'
  showSection('deadlines')
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function mkModal() {
  var bg=document.createElement('div'); bg.className='modal-bg'
  bg.innerHTML='<div class="modal"></div>'
  bg.addEventListener('click',function(e){if(e.target===bg)bg.remove()})
  return bg
}
function infoBox(label,val) {
  return '<div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:3px">'+label+'</div><div style="font-size:13px;line-height:1.4">'+val+'</div></div>'
}
function fg(label,input) { return '<div class="form-group"><label>'+label+'</label>'+input+'</div>' }

// ── Boot ──────────────────────────────────────────────────────────────────────
function renderAll() {
  try {
    renderDashboard(); renderCompanies(); renderDeadlines(); renderAlerts(); renderSettings(); updateTopBar()
  } catch(e) {
    var el = document.getElementById('s-dashboard')
    if (el) el.innerHTML = '<div style="padding:24px;color:#dc2626;font-size:13px;background:#fee2e2;border-radius:12px;margin:12px">⚠ Load error: '+e.message+'<br><small style="opacity:.7">Open in Chrome or Safari browser</small></div>'
  }
}
renderAll()
</script>
</body>
</html>
