<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FineGuard – Compliance Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c2340;--blue:#1d4ed8;--blue-lt:#3b82f6;--blue-xlt:#dbeafe;
  --bg:#eff6ff;--white:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --green:#16a34a;--green-lt:#dcfce7;--green-dot:#22c55e;
  --amber:#d97706;--amber-lt:#fef3c7;--orange:#ea580c;--orange-lt:#ffedd5;
  --red:#dc2626;--red-lt:#fee2e2;--purple:#7c3aed;--purple-lt:#f5f3ff;
  --nav-h:56px;--bottom-h:66px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a,button{cursor:pointer;-webkit-tap-highlight-color:transparent}

#topbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--navy);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:50}
.tb-logo{width:32px;height:32px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tb-brand{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px;flex:1}
.tb-tagline{font-size:10px;color:rgba(255,255,255,.45)}
.tb-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;cursor:pointer}

#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);background:var(--white);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--muted);font-weight:500;padding:8px 4px 6px;border:none;background:none;position:relative;transition:color .15s}
.bn-icon{font-size:19px;line-height:1}
.bn-tab.active{color:var(--blue)}
.bn-dot{position:absolute;top:7px;right:calc(50% - 16px);width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--white)}

#main{margin-top:var(--nav-h);padding:14px 12px calc(var(--bottom-h) + 16px);max-width:540px;margin-left:auto;margin-right:auto}
.section{display:none}.section.active{display:block}

.card{background:var(--white);border-radius:16px;box-shadow:0 1px 4px rgba(15,23,42,.08);overflow:hidden;margin-bottom:12px;border:1px solid var(--border)}
.card-pad{padding:16px}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hd-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.card-hd-link{font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;border:none;background:none}

.page-hd{margin-bottom:16px}
.page-hd .date{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.page-hd h1{font-size:22px;font-weight:800;line-height:1.2}
.page-hd p{font-size:13px;color:var(--muted);margin-top:3px}

.cs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cs-tile{border-radius:12px;padding:12px;text-align:center;cursor:pointer;border:1px solid;transition:transform .1s}
.cs-tile:active{transform:scale(.97)}
.cs-num{font-size:22px;font-weight:800;line-height:1}
.cs-label{font-size:11px;font-weight:600;margin-top:3px}
.cs-pct{font-size:10px;opacity:.65;margin-top:1px}
.cs-prog{display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.cs-prog-seg{height:100%}
.cs-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border);margin-top:4px}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{border-radius:12px;padding:14px;border:1px solid}
.stat-n{font-size:26px;font-weight:800}
.stat-l{font-size:11px;font-weight:500;margin-top:3px;opacity:.8}

.urgent-banner{display:flex;align-items:center;gap:12px;background:var(--red);color:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;cursor:pointer}
.urgent-banner:active{opacity:.9}
.ub-body{flex:1}
.ub-title{font-size:14px;font-weight:700}
.ub-sub{font-size:11px;opacity:.8;margin-top:2px}

.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:var(--muted);margin-top:1px}

.team-grid{display:flex;flex-wrap:wrap;gap:8px}
.team-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;cursor:pointer;transition:background .15s}
.team-chip:active{background:var(--border)}
.team-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.team-name{font-size:13px;font-weight:600}
.team-count{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.team-count.zero{background:var(--border);color:var(--muted)}

.alert-item{display:flex;align-items:flex-start;gap:10px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.alert-item:last-child{border-bottom:none}
.alert-item:active{background:var(--bg)}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px}
.ai-dot.read{background:transparent;border:1.5px solid var(--border)}
.ai-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-body{flex:1;min-width:0}
.ai-title{font-size:14px;font-weight:600;margin-bottom:3px}
.ai-desc{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4}

.filing-card{background:var(--white);border-radius:12px;border:1px solid var(--border);border-left-width:4px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:box-shadow .15s}
.filing-card:active{box-shadow:0 4px 12px rgba(15,23,42,.1)}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:14px;font-weight:700;margin-bottom:4px}
.fc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.fc-date{text-align:right;flex-shrink:0}
.fc-date-val{font-size:13px;font-weight:700}
.fc-overdue-lbl{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;margin-top:2px}

.portfolio-banner{border-radius:16px;padding:20px;margin-bottom:14px;color:#fff}
.po-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.po-stat{text-align:center}
.po-n{font-size:26px;font-weight:800}
.po-l{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.5;margin-top:2px}
.company-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.company-card:active{box-shadow:0 4px 12px rgba(15,23,42,.1)}
.co-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.co-avatar{width:48px;height:48px;border-radius:50%;background:var(--blue-xlt);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.co-name{font-size:15px;font-weight:800}
.co-type{font-size:12px;color:var(--muted);margin-top:1px}
.co-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.co-stat{border-radius:10px;padding:10px;text-align:center;background:var(--bg)}
.co-stat-n{font-size:18px;font-weight:800}
.co-stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.co-actions{display:flex;gap:8px}

.decision-card{background:var(--white);border-radius:16px;border:1px solid var(--border);border-left:4px solid var(--amber);padding:16px;margin-bottom:10px}
.dc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.dc-company{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
.dc-q{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:10px}
.dc-box{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:8px;line-height:1.5}
.dc-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.dc-rec{background:var(--blue-xlt);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:10px;line-height:1.5}
.dc-rec .dc-lbl{color:var(--blue)}
.dc-actions{display:flex;gap:8px;flex-wrap:wrap}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-lt);color:var(--green)}
.b-amber{background:var(--amber-lt);color:var(--amber)}
.b-orange{background:var(--orange-lt);color:var(--orange)}
.b-red{background:var(--red-lt);color:var(--red)}
.b-blue{background:var(--blue-xlt);color:var(--blue)}
.b-purple{background:var(--purple-lt);color:var(--purple)}
.b-gray{background:#f1f5f9;color:var(--muted)}

.pills{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;background:var(--white);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%;justify-content:center;margin-bottom:8px}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--white);color:var(--text);-webkit-appearance:none;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.5}

.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:#fff;color:var(--text);-webkit-appearance:none;outline:none}
.search-wrap input:focus{border-color:var(--blue)}

#toast{position:fixed;bottom:calc(var(--bottom-h) + 12px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hd h3{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}

.empty-state{background:#fff;border-radius:16px;padding:48px 20px;text-align:center}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state .es-title{font-size:17px;font-weight:700;margin-bottom:6px}
.empty-state .es-sub{font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-logo">🛡️</div>
  <div style="flex:1">
    <div class="tb-brand">FineGuard</div>
    <div class="tb-tagline">Centralise. Prioritise. Comply.</div>
  </div>
  <span id="tb-badge" class="tb-badge" style="display:none"></span>
  <div class="tb-avatar" onclick="openSettings()">G</div>
</div>

<div id="main">
  <div class="section active" id="s-dashboard"></div>
  <div class="section" id="s-alerts"></div>
  <div class="section" id="s-filings"></div>
  <div class="section" id="s-portfolio"></div>
  <div class="section" id="s-decisions"></div>
</div>

<nav id="bottom-nav">
  <button class="bn-tab active" id="tab-dashboard" onclick="showSection('dashboard')">
    <span class="bn-icon">⊞</span>Dashboard
  </button>
  <button class="bn-tab" id="tab-alerts" onclick="showSection('alerts')">
    <span class="bn-icon">🔔</span>Alerts
    <span class="bn-dot" id="alert-dot"></span>
  </button>
  <button class="bn-tab" id="tab-filings" onclick="showSection('filings')">
    <span class="bn-icon">📄</span>Filings
  </button>
  <button class="bn-tab" id="tab-portfolio" onclick="showSection('portfolio')">
    <span class="bn-icon">🏢</span>Portfolio
  </button>
  <button class="bn-tab" id="tab-decisions" onclick="showSection('decisions')">
    <span class="bn-icon">⚖️</span>Decisions
  </button>
</nav>

<div id="toast"></div>

<script>
// ── Default dataset ───────────────────────────────────────────────────────────
var DEFAULT = {
  filings: [
    {id:'f1',title:'PAYE Year End',entity:'Acme Ltd',type:'Compliance Alert',priority:'Urgent',status:'overdue',dueDate:'2026-06-05',owner:'Michelle',notes:'P60s and P11D submission required for all employees. Contact HMRC immediately.'},
    {id:'f2',title:'Corporation Tax — CT600',entity:'Acme Ltd',type:'Compliance Alert',priority:'Urgent',status:'action',dueDate:'2026-06-15',owner:'Dagon',notes:'Annual CT600 filing for financial year ending March 2026. All accounts finalised.'},
    {id:'f3',title:'VAT Return Q1 2026',entity:'Bright Futures Ltd',type:'Compliance Alert',priority:'High',status:'action',dueDate:'2026-06-30',owner:'Alissa',notes:'Making Tax Digital VAT return. Quarterly submission via MTD software.'},
    {id:'f4',title:'Payroll Run — June 2026',entity:'Acme Ltd',type:'Internal Task',priority:'High',status:'risk',dueDate:'2026-06-28',owner:'Alissa',notes:'Monthly payroll processing and RTI submission to HMRC.'},
    {id:'f5',title:'Confirmation Statement',entity:'Tech Corp Ltd',type:'Document Record',priority:'Medium',status:'risk',dueDate:'2026-07-10',owner:'Chris',notes:'Annual Companies House confirmation statement.'},
    {id:'f6',title:'Annual Accounts',entity:'Sunset Retail',type:'Document Record',priority:'Medium',status:'compliant',dueDate:'2026-07-31',owner:'Michelle',notes:'Companies House annual accounts filing. Accountant has draft ready.'},
    {id:'f7',title:'Self Assessment SA100',entity:'James Harrison',type:'Compliance Alert',priority:'Low',status:'compliant',dueDate:'2027-01-31',owner:'George',notes:'Personal tax return for FY 2025/26. Plenty of time remaining.'},
    {id:'f8',title:'AML Training Records',entity:'Bright Futures Ltd',type:'Compliance Alert',priority:'Medium',status:'compliant',dueDate:'2026-09-30',owner:'Dagon',notes:'Annual AML training completion records for all staff.'},
  ],
  alerts: [
    {id:'a1',title:'Critical: PAYE Year End Overdue',desc:'PAYE year-end submission overdue. Complete immediately to avoid HMRC penalties.',priority:'Urgent',badge:'Overdue',read:false,icon:'⚠️',color:'red'},
    {id:'a2',title:'Corporation Tax CT600 Due in 2 Days',desc:'Complete CT600 for Acme Ltd by 15 Jun 2026. All figures confirmed.',priority:'High',badge:'Due Soon',read:false,icon:'📅',color:'amber'},
    {id:'a3',title:'Policy Acknowledgement Required',desc:'Code of Conduct policy requires acknowledgement from all staff before month end.',priority:'Medium',badge:'Policy',read:false,icon:'📋',color:'blue'},
    {id:'a4',title:'New Regulatory Update — AML Rules',desc:'New AML regulation published 10 Jun 2026. Review and take action if applicable.',priority:'Low',badge:'Update',read:true,icon:'💬',color:'purple'},
    {id:'a5',title:'Q2 Compliance Report Submitted',desc:'Quarterly compliance report successfully submitted and accepted by regulator.',priority:'Low',badge:'Acknowledged',read:true,icon:'✅',color:'green'},
  ],
  decisions: [
    {id:'d1',company:'Bright Futures Ltd',question:'Approve referral agreement with FinTech Partners (15% revenue share)?',options:'A) Approve as-is   B) Negotiate to 12%   C) Decline',recommendation:'Recommend Option A — market rate for quality leads in this sector.',dueDate:'2026-06-18',resolved:false,resolution:null},
    {id:'d2',company:'Acme Ltd',question:'Counter-offer on lease renewal: accept 4% increase or push back to 3%?',options:'A) Accept 4%   B) Counter 3%   C) Explore alternatives',recommendation:'Counter at 3% — landlord is motivated to retain long-term tenant.',dueDate:'2026-06-25',resolved:false,resolution:null},
    {id:'d3',company:'Tech Corp Ltd',question:'Approve £12k spend on new compliance management software (annual licence)?',options:'A) Approve full amount   B) Negotiate 2-year deal for discount   C) Defer to Q3',recommendation:'Option B — likely 15–20% discount on a 2-year term.',dueDate:'2026-07-05',resolved:false,resolution:null},
  ],
  companies: [
    {id:'c1',name:'Acme Ltd',type:'Manufacturing & Distribution',avatar:'👷',person:'Sarah Chen'},
    {id:'c2',name:'Bright Futures Ltd',type:'Customer Support',avatar:'👩‍💼',person:'Emma Wilson'},
    {id:'c3',name:'Tech Corp Ltd',type:'Technology & SaaS',avatar:'👨‍💼',person:'Liam O\'Brien'},
    {id:'c4',name:'Sunset Retail',type:'Retail & Commerce',avatar:'🛍️',person:'Priya Kumar'},
  ]
}

// ── State ─────────────────────────────────────────────────────────────────────
function loadState() {
  try { var s = localStorage.getItem('fg2'); return s ? JSON.parse(s) : clone(DEFAULT) } catch(e) { return clone(DEFAULT) }
}
function saveState() { try { localStorage.setItem('fg2', JSON.stringify(state)) } catch(e) {} }
function clone(o) { return JSON.parse(JSON.stringify(o)) }

var state = loadState()
var ui = { section:'dashboard', filingFilter:'all', filingSearch:'', alertFilter:'all' }

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return 'x' + Math.random().toString(36).slice(2,8) + Date.now().toString(36) }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function fmtShort(d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
}
function fmtFull(d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
}
function isPast(d) { return d && new Date(d) < new Date() }

var toastTimer
function toast(msg) {
  clearTimeout(toastTimer)
  var t = document.getElementById('toast')
  t.textContent = '✓ ' + msg
  t.classList.add('show')
  toastTimer = setTimeout(function(){ t.classList.remove('show') }, 2400)
}

// ── Metrics ───────────────────────────────────────────────────────────────────
var STATUS_ORDER = {overdue:0,action:1,risk:2,compliant:3,done:4}
var STATUS_INFO = {
  overdue:  {label:'Overdue',     badge:'b-red',    border:'var(--red)',       bg:'var(--red-lt)'},
  action:   {label:'Action Req.', badge:'b-orange',  border:'var(--orange)',    bg:'var(--orange-lt)'},
  risk:     {label:'At Risk',     badge:'b-amber',  border:'var(--amber)',     bg:'var(--amber-lt)'},
  compliant:{label:'Compliant',   badge:'b-green',  border:'var(--green-dot)', bg:'var(--green-lt)'},
  done:     {label:'Completed',   badge:'b-green',  border:'var(--green)',     bg:'var(--green-lt)'},
}
var PRIORITY_BADGE = {Urgent:'b-red',High:'b-amber',Medium:'b-blue',Low:'b-gray'}
var PRIORITY_DOT   = {Urgent:'var(--red)',High:'var(--orange)',Medium:'#f59e0b',Low:'var(--muted)'}
var ALERT_BG    = {red:'var(--red-lt)',amber:'var(--amber-lt)',blue:'var(--blue-xlt)',purple:'#f3e8ff',green:'var(--green-lt)',gray:'#f1f5f9'}
var ALERT_BADGE = {red:'b-red',amber:'b-amber',blue:'b-blue',purple:'b-purple',green:'b-green',gray:'b-gray'}

function metrics() {
  var active = state.filings.filter(function(f){return f.status!=='done'})
  var overdue   = active.filter(function(f){return f.status==='overdue'}).length
  var action    = active.filter(function(f){return f.status==='action'}).length
  var risk      = active.filter(function(f){return f.status==='risk'}).length
  var compliant = active.filter(function(f){return f.status==='compliant'}).length
  var done      = state.filings.filter(function(f){return f.status==='done'}).length
  var total     = active.length
  var unread    = state.alerts.filter(function(a){return !a.read}).length
  var openDec   = state.decisions.filter(function(d){return !d.resolved}).length
  return {overdue,action,risk,compliant,done,total,unread,openDec,grand:total||1}
}

function coStats(name) {
  var active = state.filings.filter(function(f){return f.entity===name&&f.status!=='done'})
  return {items:active.length, overdue:active.filter(function(f){return f.status==='overdue'}).length}
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')})
  document.querySelectorAll('.bn-tab').forEach(function(t){t.classList.remove('active')})
  var sec = document.getElementById('s-'+name)
  var tab = document.getElementById('tab-'+name)
  if (sec) sec.classList.add('active')
  if (tab) tab.classList.add('active')
  window.scrollTo(0,0)
  ui.section = name
  var renders = {dashboard:renderDashboard,alerts:renderAlerts,filings:renderFilings,portfolio:renderPortfolio,decisions:renderDecisions}
  if (renders[name]) renders[name]()
}

function updateTopBar() {
  var m = metrics()
  var badge = document.getElementById('tb-badge')
  var dot = document.getElementById('alert-dot')
  if (badge) { badge.style.display = m.unread > 0 ? '' : 'none'; badge.textContent = m.unread + ' alert' + (m.unread!==1?'s':'') }
  if (dot) dot.style.display = m.unread > 0 ? '' : 'none'
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

    .filter(function(f){return f.status!=='done'})

  h += '<div class="cs-prog-seg" style="flex:'+(m.risk||0.01)+';background:#f59e0b"></div>'

  h += statBox(m.openDec,'Decisions','var(--purple-lt)','#ddd6fe','var(--purple)')
  h += statBox(m.unread,'Unread Alerts','#fff7ed','#fed7aa','var(--orange)')

// ── ALERTS ────────────────────────────────────────────────────────────────────
function renderAlerts() {
  var m = metrics()
  var unread = state.alerts.filter(function(a){return !a.read}).length
  var filtered = uiState_alertFiltered()

  var h = '<div class="page-hd"><h1>Compliance Alerts</h1><p>'+unread+' unread · '+state.alerts.length+' total</p></div>'

  h += '<div class="pills">'
  h += pill('all','All ('+state.alerts.length+')','alertFilter')
  h += pill('unread','🔵 Unread ('+unread+')','alertFilter')
  h += pill('read','Read ('+(state.alerts.length-unread)+')','alertFilter')
  h += '</div>'

  h += '<div class="card"><div class="card-hd"><span class="card-hd-title">Notifications</span>'
  if (unread > 0) h += '<button class="btn btn-secondary btn-sm" onclick="markAllAlertsRead()">✓ Mark all read</button>'
  else h += '<span style="font-size:12px;color:var(--green);font-weight:600">All read ✓</span>'
  h += '</div>'

  if (filtered.length === 0) {
    h += '<div style="padding:32px;text-align:center;color:var(--muted);font-size:14px">No alerts in this filter</div>'

    filtered.forEach(function(a){
      var bgc = ALERT_BG[a.color]||ALERT_BG.gray
      var bc = ALERT_BADGE[a.color]||'b-gray'
      h += '<div class="alert-item'+(a.read?'':' unread')+'" style="'+(a.read?'opacity:.65':'')+';" onclick="toggleAlertRead(\''+a.id+'\')">'
      h += '<div class="ai-dot'+(a.read?' read':'')+'"></div>'
      h += '<div class="ai-icon" style="background:'+bgc+'">'+a.icon+'</div>'
      h += '<div class="ai-body">'
      h += '<div class="ai-title">'+esc(a.title)+'</div>'
      h += '<div class="ai-desc">'+esc(a.desc)+'</div>'
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px"><span class="badge '+bc+'">'+esc(a.badge)+'</span>'
      if (a.priority==='Urgent') h += '<span style="font-size:11px;font-weight:700;color:var(--red)">▲ Urgent</span>'
      if (a.priority==='High')   h += '<span style="font-size:11px;font-weight:700;color:var(--orange)">▲ High</span>'
      h += '</div></div>'
      h += '<button style="border:none;background:none;font-size:20px;color:var(--muted);padding:0 4px;flex-shrink:0;line-height:1" onclick="event.stopPropagation();deleteAlert(\''+a.id+'\')">×</button>'
      h += '</div>'
    })
  }
  h += '</div>'
  h += '<button class="btn btn-primary btn-full" onclick="openNewAlert()">+ New Alert</button>'

  document.getElementById('s-alerts').innerHTML = h
}

function uiState_alertFiltered() {
  return state.alerts.filter(function(a){
    if (ui.alertFilter==='unread') return !a.read
    if (ui.alertFilter==='read') return a.read
    return true
  })
}

// ── FILINGS ───────────────────────────────────────────────────────────────────
function renderFilings() {
  var m = metrics()
  var search = ui.filingSearch.toLowerCase().trim()
  var filter = ui.filingFilter

  var allActive = state.filings.filter(function(f){return f.status!=='done'})
  var doneItems = state.filings.filter(function(f){return f.status==='done'})

  var filtered = state.filings.filter(function(f){
    if (filter==='done') return f.status==='done'
    if (filter!=='all' && f.status!==filter) return false
    if (filter==='all' && f.status==='done') return false
    if (search && !f.title.toLowerCase().includes(search) && !f.entity.toLowerCase().includes(search) && !f.owner.toLowerCase().includes(search) && !(f.notes||'').toLowerCase().includes(search)) return false
    return true
  }).sort(function(a,b){
    var so = (STATUS_ORDER[a.status]||99)-(STATUS_ORDER[b.status]||99)
    if (so!==0) return so
    return ['Urgent','High','Medium','Low'].indexOf(a.priority)-['Urgent','High','Medium','Low'].indexOf(b.priority)
  })

  var h = ''
  h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px">'
  h += '<div class="page-hd" style="margin-bottom:0"><h1>Filing Obligations</h1><p>'+allActive.length+' active · '+doneItems.length+' completed</p></div>'
  h += '<button class="btn btn-sm" style="background:var(--navy);color:#fff;flex-shrink:0;margin-top:4px" onclick="openNewFiling()">+ Add</button></div>'

  // Summary tiles
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">'
  h += fTile('overdue',m.overdue,'var(--red)','var(--red-lt)','#fca5a5','Overdue')
  h += fTile('action',m.action,'var(--orange)','#fff7ed','#fed7aa','Action')
  h += fTile('risk',m.risk,'var(--amber)','#fefce8','#fde68a','At Risk')
  h += fTile('compliant',m.compliant,'var(--green)','var(--green-lt)','#86efac','Compliant')
  h += '</div>'

  // Search
  h += '<div class="search-wrap"><input type="search" placeholder="🔍  Search filings, entities, owners…" value="'+esc(ui.filingSearch)+'" oninput="onFilingSearch(this.value)" id="fsearch"></div>'

  // Filter pills
  h += '<div class="pills">'
  h += fPill('all','All ('+allActive.length+')')
  h += fPill('overdue','🔴 Overdue')
  h += fPill('action','⚠ Action')
  h += fPill('risk','⚡ At Risk')
  h += fPill('compliant','✓ Compliant')
  h += fPill('done','✅ Done ('+doneItems.length+')')
  h += '</div>'

  if (filtered.length === 0) {
    h += '<div class="empty-state"><div class="es-icon">📋</div><div class="es-title">No items found</div><div class="es-sub">Try a different filter or search term</div></div>'
  } else {
    filtered.forEach(function(item){
      var si = STATUS_INFO[item.status]||STATUS_INFO.compliant
      var pb = PRIORITY_BADGE[item.priority]||'b-gray'
      var dateColor = item.status==='overdue'?'var(--red)':item.status==='action'?'var(--orange)':'var(--muted)'
      h += '<div class="filing-card" style="border-left-color:'+si.border+(item.status==='done'?';opacity:.65':'')+';" onclick="openFilingModal(\''+item.id+'\')">'
      h += '<div class="fc-body">'
      h += '<div class="fc-title">'+esc(item.title)+'</div>'
      h += '<div class="fc-meta"><span style="font-size:12px;color:var(--muted)">'+esc(item.entity)+'</span><span class="badge '+si.badge+'">'+si.label+'</span><span class="badge '+pb+'">'+item.priority+'</span></div>'
      h += '<div style="font-size:11px;color:var(--muted);margin-top:5px">👤 '+esc(item.owner)+'</div>'
      h += '</div>'
      h += '<div class="fc-date"><div class="fc-date-val" style="color:'+dateColor+'">'+fmtShort(item.dueDate)+'</div>'
      if (item.status==='overdue') h += '<div class="fc-overdue-lbl">Overdue</div>'
      h += '</div></div>'
    })
  }

  document.getElementById('s-filings').innerHTML = h

  // Restore search focus if user was typing
  if (search) {
    var inp = document.getElementById('fsearch')
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length) }
  }
}

function fTile(f,n,color,bg,border,label) {
  var active = ui.filingFilter===f
  return '<div onclick="setFilingFilter(\''+f+'\')" style="background:'+bg+';border:'+(active?'2px solid var(--navy)':'1px solid '+border)+';border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:border .15s">'
    +'<div style="font-size:20px;font-weight:800;color:'+color+'">'+n+'</div>'
    +'<div style="font-size:10px;font-weight:600;color:'+color+';margin-top:2px">'+label+'</div>'
    +'</div>'
}
function fPill(f,label) {
  return '<button class="pill'+(ui.filingFilter===f?' active':'')+'" onclick="setFilingFilter(\''+f+'\')">'+label+'</button>'
}

// ── DECISIONS ─────────────────────────────────────────────────────────────────

  var resolved = state.decisions.filter(function(d){return d.resolved})

  var h = '<div class="page-hd"><h1>Decision Queue</h1><p>'

    h += '<div class="empty-state"><div class="es-icon">✅</div><div class="es-title">All caught up!</div><div class="es-sub">No decisions awaiting your approval.</div></div>'
  }

  open.forEach(function(d){
    var overdue = isPast(d.dueDate)
    h += '<div class="decision-card">'
    h += '<div class="dc-top"><span class="badge b-amber">⚖️ Decision Required</span>'
    h += '<div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Due</div><div style="font-size:13px;font-weight:700;color:'+(overdue?'var(--red)':'var(--orange)')+'">'+fmtFull(d.dueDate)+'</div></div></div>'

    h += '<div class="dc-q">'+esc(d.question)+'</div>'
    h += '<div class="dc-box"><div class="dc-lbl">Options</div>'+esc(d.options)+'</div>'

    h += '<div class="dc-actions">'
    h += '<button class="btn btn-green" onclick="resolveDecision(\''+d.id+'\',\'Approved\')">✓ Approve</button>'
    h += '<button class="btn btn-danger" onclick="resolveDecision(\''+d.id+'\',\'Rejected\')">✗ Reject</button>'
    h += '<button class="btn btn-secondary" onclick="resolveDecision(\''+d.id+'\',\'More Info\')">? Need Info</button>'
    h += '</div></div>'
  })

  if (resolved.length>0) {
    h += '<details style="margin-top:8px"><summary style="background:#fff;border-radius:12px;padding:14px 16px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between">Resolved ('+resolved.length+') <span>▾</span></summary>'
    resolved.forEach(function(d){
      var resColor = d.resolution==='Approved'?'var(--green)':d.resolution==='Rejected'?'var(--red)':'var(--muted)'

      h += '<div class="dc-q" style="font-size:13px">'+esc(d.question)+'</div>'
      h += '</div>'
    })
    h += '</details>'
  }

  h += '<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="openNewDecision()">+ New Decision</button>'

  document.getElementById('s-decisions').innerHTML = h
}

// ── Filing modal ──────────────────────────────────────────────────────────────
function openFilingModal(id) {
  var item = state.filings.find(function(f){return f.id===id})
  if (!item) return
  var si = STATUS_INFO[item.status]||STATUS_INFO.compliant
  var pb = PRIORITY_BADGE[item.priority]||'b-gray'
  var isDone = item.status==='done'

  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>'+esc(item.title)+'</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"><span class="badge '+si.badge+'">'+si.label+'</span><span class="badge '+pb+'">'+item.priority+'</span></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +infoBox('Entity',esc(item.entity))
    +infoBox('Due Date','<span style="'+(item.status==='overdue'?'color:var(--red)':'')+'">'+(item.dueDate?fmtFull(item.dueDate):'No date set')+'</span>')
    +infoBox('Owner',esc(item.owner))
    +infoBox('Type',esc(item.type))
    +'</div>'
    +(item.notes?'<p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">'+esc(item.notes)+'</p>':'')
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +(!isDone?'<button class="btn btn-green" onclick="this.closest(\'.modal-bg\').remove();markFilingDone(\''+id+'\')">✓ Mark Complete</button>':'')
    +(!isDone?'<button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove();toast(\'Reminder set\')">🔔 Reminder</button>':'')
    +'<button class="btn btn-secondary" style="color:var(--red)" onclick="this.closest(\'.modal-bg\').remove();deleteFiling(\''+id+'\')">🗑 Delete</button>'
    +'<button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove()">Close</button>'
    +'</div>'
  document.body.appendChild(m)
}

// ── Company modal ─────────────────────────────────────────────────────────────
function openCompanyModal(id) {
  var c = state.companies.find(function(x){return x.id===id})
  if (!c) return
  var s = coStats(c.name)
  var ok = s.overdue===0
  var coFilings = state.filings.filter(function(f){return f.entity===c.name&&f.status!=='done'})

  var filingRows = coFilings.map(function(f){
    var si = STATUS_INFO[f.status]||STATUS_INFO.compliant
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
      +'<span class="badge '+si.badge+'">'+si.label+'</span>'
      +'<span style="font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.title)+'</span>'
      +'<span style="font-size:12px;color:var(--muted);flex-shrink:0">'+fmtShort(f.dueDate)+'</span>'
      +'</div>'
  }).join('')

  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>'+esc(c.name)+'</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'
    +'<div style="width:56px;height:56px;border-radius:50%;background:var(--blue-xlt);display:flex;align-items:center;justify-content:center;font-size:26px">'+c.avatar+'</div>'
    +'<div><div style="font-size:17px;font-weight:800">'+esc(c.name)+'</div><div style="font-size:12px;color:var(--muted)">'+esc(c.type)+'</div>'
    +'<span class="badge '+(ok?'b-green':'b-amber')+'" style="margin-top:5px;display:inline-flex">'+(ok?'✓ Compliant':'⚠ Attention')+'</span></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">'
    +'<div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--blue)">'+s.items+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Active Items</div></div>'
    +'<div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center"><div style="font-size:14px;font-weight:700">'+esc(c.person)+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Contact</div></div>'
    +'<div style="background:'+(s.overdue>0?'var(--red-lt)':'var(--green-lt)')+';border-radius:10px;padding:12px;text-align:center"><div style="font-size:20px;font-weight:800;color:'+(s.overdue>0?'var(--red)':'var(--green)')+'">'+s.overdue+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Overdue</div></div>'
    +'</div>'
    +(coFilings.length>0?'<div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Active Filings</div>'+filingRows+'</div>':'')
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-primary" onclick="this.closest(\'.modal-bg\').remove();filterFilingsByEntity(\''+esc(c.name)+'\')">View Filings</button>'
    +'<button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove()">Close</button>'
    +'</div>'
  document.body.appendChild(m)
}

// ── New filing modal ──────────────────────────────────────────────────────────
function openNewFiling() {
  var opts = state.companies.map(function(c){return '<option>'+esc(c.name)+'</option>'}).join('')
  var today = new Date().toISOString().split('T')[0]
  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>New Filing</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +fg('Title *','<input id="nf-t" placeholder="e.g. Corporation Tax — CT600" autocomplete="off">')
    +fg('Entity / Company','<select id="nf-e"><option value="">— Select —</option>'+opts+'<option value="__">Other…</option></select>')
    +'<div class="form-group" id="nf-ow" style="display:none">'+fglabel('Company name')+'<input id="nf-ot" placeholder="Enter company name"></div>'
    +fg('Due Date','<input id="nf-d" type="date" value="'+today+'">')
    +fg('Priority','<select id="nf-p"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select>')
    +fg('Type','<select id="nf-tp"><option>Compliance Alert</option><option>Document Record</option><option>Internal Task</option></select>')
    +fg('Owner','<select id="nf-o"><option>George</option><option>Dagon</option><option>Alissa</option><option>Michelle</option><option>Chris</option><option>Charlie</option></select>')
    +fg('Notes','<textarea id="nf-n" placeholder="Context, reference numbers, deadlines…"></textarea>')
    +'<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="submitFiling()">Create Filing</button><button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button></div>'
  document.body.appendChild(m)
  setTimeout(function(){ var i=document.getElementById('nf-t'); if(i)i.focus() },50)
  var sel = document.getElementById('nf-e')
  if (sel) sel.onchange = function(){ document.getElementById('nf-ow').style.display = this.value==='__'?'block':'none' }
}

function submitFiling() {
  var title = (document.getElementById('nf-t')||{}).value||''
  if (!title.trim()) { toast('Title is required'); return }
  var eSel = document.getElementById('nf-e')
  var entity = eSel&&eSel.value==='__' ? ((document.getElementById('nf-ot')||{}).value||'').trim() : (eSel||{}).value||''
  var due = (document.getElementById('nf-d')||{}).value||''
  var priority = (document.getElementById('nf-p')||{}).value||'Medium'
  var type = (document.getElementById('nf-tp')||{}).value||'Compliance Alert'
  var owner = (document.getElementById('nf-o')||{}).value||'George'
  var notes = (document.getElementById('nf-n')||{}).value||''
  var status = 'compliant'
  if (due) {
    var diff = Math.ceil((new Date(due)-new Date())/86400000)
    if (diff<0) status='overdue'; else if (diff<=7) status='action'; else if (diff<=30) status='risk'
  }
  state.filings.push({id:uid(),title:title.trim(),entity:entity||'General',type,priority,status,dueDate:due,owner,notes:notes.trim()})
  saveState()
  document.querySelector('.modal-bg').remove()
  toast('Filing created')
  renderFilings(); renderDashboard(); renderPortfolio()
}

// ── New alert modal ───────────────────────────────────────────────────────────
function openNewAlert() {
  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>New Alert</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +fg('Title *','<input id="na-t" placeholder="e.g. VAT Return Overdue" autocomplete="off">')
    +fg('Description','<textarea id="na-d" placeholder="Details about this alert…"></textarea>')
    +fg('Priority','<select id="na-p"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select>')
    +'<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="submitAlert()">Create Alert</button><button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button></div>'
  document.body.appendChild(m)
  setTimeout(function(){ var i=document.getElementById('na-t'); if(i)i.focus() },50)
}

function submitAlert() {
  var title = (document.getElementById('na-t')||{}).value||''
  if (!title.trim()) { toast('Title is required'); return }
  var desc = (document.getElementById('na-d')||{}).value||''
  var priority = (document.getElementById('na-p')||{}).value||'Medium'
  var colorMap={Urgent:'red',High:'amber',Medium:'blue',Low:'gray'}
  var badgeMap={Urgent:'Urgent',High:'High Priority',Medium:'Notification',Low:'Info'}
  var iconMap={Urgent:'⚠️',High:'📅',Medium:'📋',Low:'💬'}
  state.alerts.unshift({id:uid(),title:title.trim(),desc:desc.trim()||'No additional details.',priority,badge:badgeMap[priority],read:false,icon:iconMap[priority]||'📋',color:colorMap[priority]||'blue'})
  saveState()
  document.querySelector('.modal-bg').remove()
  toast('Alert created')
  renderAlerts(); updateTopBar(); renderDashboard()
}

// ── New decision modal ────────────────────────────────────────────────────────
function openNewDecision() {
  var opts = state.companies.map(function(c){return '<option>'+esc(c.name)+'</option>'}).join('')
  var today = new Date(); today.setDate(today.getDate()+14)
  var defDue = today.toISOString().split('T')[0]
  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>New Decision</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +fg('Company','<select id="nd-c">'+opts+'</select>')
    +fg('Question *','<textarea id="nd-q" placeholder="What decision needs to be made?"></textarea>')
    +fg('Options','<textarea id="nd-o" placeholder="A) Option 1   B) Option 2   C) Option 3"></textarea>')
    +fg('Recommendation','<textarea id="nd-r" placeholder="Recommended course of action…"></textarea>')
    +fg('Due Date','<input id="nd-d" type="date" value="'+defDue+'">')
    +'<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="submitDecision()">Create Decision</button><button class="btn btn-secondary" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button></div>'
  document.body.appendChild(m)
  setTimeout(function(){ var i=document.getElementById('nd-q'); if(i)i.focus() },50)
}

function submitDecision() {
  var q = (document.getElementById('nd-q')||{}).value||''
  if (!q.trim()) { toast('Question is required'); return }
  var company = (document.getElementById('nd-c')||{}).value||''
  var options = (document.getElementById('nd-o')||{}).value||''
  var rec = (document.getElementById('nd-r')||{}).value||''
  var due = (document.getElementById('nd-d')||{}).value||''
  state.decisions.unshift({id:uid(),company:company||'General',question:q.trim(),options:options.trim(),recommendation:rec.trim(),dueDate:due,resolved:false,resolution:null})
  saveState()
  document.querySelector('.modal-bg').remove()
  toast('Decision created')
  renderDecisions(); renderDashboard()
}

// ── Settings modal ────────────────────────────────────────────────────────────
function openSettings() {
  var m = mkModal()
  m.querySelector('.modal').innerHTML =
    '<div class="modal-hd"><h3>Settings</h3><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">×</button></div>'
    +'<div style="display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg);border-radius:12px;margin-bottom:16px">'
    +'<div style="width:52px;height:52px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800">G</div>'
    +'<div><div style="font-size:16px;font-weight:700">George</div><div style="font-size:12px;color:var(--muted)">Compliance Manager</div><div style="font-size:12px;color:var(--blue);margin-top:2px">george@firm.co.uk</div></div>'
    +'</div>'
    +settingsRow('🔔','Notification Preferences',"toast('Coming soon')")
    +settingsRow('🔑','Change Passcode',"toast('Coming soon')")
    +settingsRow('📊','Export Data',"exportData()")
    +'<div style="margin-top:6px">'+settingsRow('↺','Reset Demo Data',"this.closest('.modal-bg').remove();resetData()",'var(--red)')+'</div>'
    +'<button class="btn btn-danger btn-full" style="margin-top:8px" onclick="this.closest(\'.modal-bg\').remove();toast(\'Signed out — prototype only\')">Sign Out</button>'
  document.body.appendChild(m)
}

function settingsRow(icon,label,action,color) {
  return '<div style="padding:14px;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px" onclick="'+action+'">'
    +'<span style="'+(color?'color:'+color:'')+'">'+icon+' '+label+'</span><span style="color:var(--muted)">›</span></div>'
}

function resetData() {
  if (!confirm('Reset all data to default demo values?')) return
  localStorage.removeItem('fg2')
  state = clone(DEFAULT)
  ui.filingFilter='all'; ui.filingSearch=''; ui.alertFilter='all'
  renderAll()
  toast('Data reset to defaults')
}

function exportData() {
  var json = JSON.stringify(state, null, 2)
  var blob = new Blob([json], {type:'application/json'})
  var a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'fineguard-export.json'
  a.click()
  toast('Data exported')
}

// ── Actions ───────────────────────────────────────────────────────────────────
function markFilingDone(id) {
  var item = state.filings.find(function(f){return f.id===id})
  if (item) { item.status='done'; saveState() }
  toast('Marked as complete')
  renderFilings(); renderDashboard(); renderPortfolio()
}

function deleteFiling(id) {
  if (!confirm('Delete this filing?')) return
  state.filings = state.filings.filter(function(f){return f.id!==id})
  saveState()
  renderFilings(); renderDashboard(); renderPortfolio()
  toast('Filing deleted')
}

function toggleAlertRead(id) {
  var a = state.alerts.find(function(x){return x.id===id})
  if (a) { a.read=!a.read; saveState() }
  renderAlerts(); updateTopBar(); renderDashboard()
}

function markAllAlertsRead() {
  state.alerts.forEach(function(a){a.read=true})
  saveState(); renderAlerts(); updateTopBar(); renderDashboard(); toast('All marked as read')
}

function deleteAlert(id) {
  if (!confirm('Delete this alert?')) return
  state.alerts = state.alerts.filter(function(a){return a.id!==id})
  saveState(); renderAlerts(); updateTopBar(); renderDashboard()
}

function resolveDecision(id, action) {
  var d = state.decisions.find(function(x){return x.id===id})
  if (d) { d.resolved=true; d.resolution=action; saveState() }
  toast('Decision: '+action)
  renderDecisions(); renderDashboard()
}

// ── Filter helpers ────────────────────────────────────────────────────────────
function setFilingFilter(f) { ui.filingFilter=f; ui.filingSearch=''; renderFilings() }
function onFilingSearch(v) { ui.filingSearch=v; ui.filingFilter='all'; renderFilings() }
function filterFilingsAndGo(f) { ui.filingFilter=f; ui.filingSearch=''; showSection('filings') }
function filterFilingsByOwner(o) { ui.filingSearch=o; ui.filingFilter='all'; showSection('filings') }
function filterFilingsByEntity(n) { ui.filingSearch=n; ui.filingFilter='all'; showSection('filings') }
function setAlertFilter(f) { ui.alertFilter=f; renderAlerts() }

function pill(val,label,key) {
  return '<button class="pill'+(ui[key]===val?' active':'')+'" onclick="setAlertFilter(\''+val+'\')">'+label+'</button>'
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function mkModal() {
  var bg = document.createElement('div')
  bg.className = 'modal-bg'
  bg.innerHTML = '<div class="modal"></div>'
  bg.addEventListener('click',function(e){ if(e.target===bg) bg.remove() })
  return bg
}
function infoBox(label,val) {
  return '<div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:3px">'+label+'</div><div style="font-size:14px;font-weight:600">'+val+'</div></div>'
}
function fg(label,input) {
  return '<div class="form-group"><label>'+label+'</label>'+input+'</div>'
}
function fglabel(label) {
  return '<label style="display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">'+label+'</label>'
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard(); renderAlerts(); renderFilings(); renderPortfolio(); renderDecisions(); updateTopBar()
}
renderAll()
</script>
</body>
</html>
