<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FineGuard – Compliance Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0c2340;
  --navy2: #112d4e;
  --navy3: #1a3a6c;
  --blue: #1d4ed8;
  --blue-lt: #3b82f6;
  --blue-xlt: #dbeafe;
  --bg: #eff6ff;
  --bg2: #f0f7ff;
  --white: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --green: #16a34a;
  --green-lt: #dcfce7;
  --green-dot: #22c55e;
  --amber: #d97706;
  --amber-lt: #fef3c7;
  --orange: #ea580c;
  --orange-lt: #ffedd5;
  --red: #dc2626;
  --red-lt: #fee2e2;
  --shadow: 0 1px 4px rgba(15,23,42,.08), 0 4px 16px rgba(15,23,42,.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,.12), 0 2px 6px rgba(15,23,42,.06);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── SIDEBAR ── */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 64px;
  background: var(--navy); display: flex; flex-direction: column; align-items: center;
  padding: 16px 0; z-index: 60; transition: width .2s;
}
#sidebar.expanded { width: 220px; }
.sb-logo { display: flex; align-items: center; gap: 10px; padding: 0 16px 20px; width: 100%; }
.sb-logo .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sb-logo .logo-text { color: #fff; font-size: 17px; font-weight: 800; letter-spacing: -.3px; opacity: 0; transition: opacity .15s; white-space: nowrap; }
#sidebar.expanded .logo-text { opacity: 1; }
.sb-divider { width: 36px; height: 1px; background: rgba(255,255,255,.12); margin: 8px auto; }
#sidebar.expanded .sb-divider { width: calc(100% - 32px); }
.sb-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; width: calc(100% - 16px); margin: 2px 8px; border-radius: 10px; cursor: pointer; transition: background .15s; text-decoration: none; position: relative; }
.sb-item .sb-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 17px; flex-shrink: 0; }
.sb-item .sb-label { color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .1s; white-space: nowrap; }
#sidebar.expanded .sb-label { opacity: 1; }
.sb-item:hover { background: rgba(255,255,255,.08); }
.sb-item:hover .sb-label { color: #fff; }
.sb-item.active { background: var(--blue); }
.sb-item.active .sb-icon { background: rgba(255,255,255,.15); }
.sb-item.active .sb-label { color: #fff; }
.sb-badge { position: absolute; top: 8px; right: 8px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
#sidebar.expanded .sb-badge { position: static; margin-left: auto; }
.sb-toggle { margin-top: auto; }

/* ── TOP BAR ── */
#topbar {
  position: fixed; top: 0; left: 64px; right: 0; height: 60px;
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 50; transition: left .2s;
}
#topbar.shifted { left: 220px; }
.topbar-title { font-size: 20px; font-weight: 700; color: var(--text); }
.topbar-title span { color: var(--muted); font-size: 13px; font-weight: 400; margin-left: 8px; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-bell { position: relative; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); font-size: 16px; }
.topbar-bell .dot { position: absolute; top: 7px; right: 8px; width: 8px; height: 8px; background: var(--blue); border-radius: 50%; border: 2px solid #fff; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--navy3)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.user-name { font-size: 13px; font-weight: 600; }
.user-role { font-size: 11px; color: var(--muted); }

/* ── MAIN ── */
#main { margin-left: 64px; margin-top: 60px; padding: 24px; min-height: calc(100vh - 60px); transition: margin-left .2s; }
#main.shifted { margin-left: 220px; }

/* ── CARDS ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
.card-pad { padding: 20px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.card-title a { font-size: 12px; font-weight: 500; color: var(--blue); cursor: pointer; }

/* ── STATUS BAR ── */
.compliance-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.comp-seg { flex: 1; min-width: 80px; border-radius: 12px; padding: 14px 16px; border: 1px solid transparent; cursor: pointer; transition: transform .15s; }
.comp-seg:hover { transform: translateY(-2px); }
.comp-seg .cs-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.comp-seg .cs-label { font-size: 12px; font-weight: 500; color: var(--muted); }
.comp-seg .cs-num { font-size: 28px; font-weight: 800; margin-top: 4px; }
.comp-seg .cs-pct { font-size: 12px; color: var(--muted); }
.cs-compliant { background: #f0fdf4; border-color: #bbf7d0; }
.cs-compliant .cs-dot { background: var(--green-dot); }
.cs-compliant .cs-num { color: var(--green); }
.cs-risk { background: var(--amber-lt); border-color: #fcd34d; }
.cs-risk .cs-dot { background: var(--amber); }
.cs-risk .cs-num { color: var(--amber); }
.cs-action { background: var(--orange-lt); border-color: #fdba74; }
.cs-action .cs-dot { background: var(--orange); }
.cs-action .cs-num { color: var(--orange); }
.cs-overdue { background: var(--red-lt); border-color: #fca5a5; }
.cs-overdue .cs-dot { background: var(--red); }
.cs-overdue .cs-num { color: var(--red); }

/* ── PROGRESS STRIP ── */
.prog-strip { height: 10px; border-radius: 5px; display: flex; overflow: hidden; gap: 2px; margin-bottom: 6px; }
.ps-seg { height: 100%; border-radius: 3px; }

/* ── STAT ROW ── */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; }
.stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.stat-n { font-size: 22px; font-weight: 800; }
.stat-l { font-size: 11px; color: var(--muted); margin-top: 1px; }
.stat-delta { font-size: 11px; color: var(--green); margin-top: 2px; }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; border-radius: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
thead th:first-child { border-radius: 12px 0 0 0; }
thead th:last-child { border-radius: 0 12px 0 0; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg2); }
td { padding: 12px 14px; vertical-align: middle; }
.td-title { font-weight: 600; font-size: 13px; }
.td-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-green { background: var(--green-lt); color: var(--green); }
.b-amber { background: var(--amber-lt); color: var(--amber); }
.b-orange { background: var(--orange-lt); color: var(--orange); }
.b-red { background: var(--red-lt); color: var(--red); }
.b-blue { background: var(--blue-xlt); color: var(--blue); }
.b-gray { background: #f1f5f9; color: #475569; }
.b-navy { background: var(--navy2); color: #93c5fd; }
.dot-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-green { background: var(--green-dot); }
.dot-amber { background: #f59e0b; }
.dot-red { background: var(--red); }
.dot-blue { background: var(--blue-lt); }
.dot-gray { background: #94a3b8; }

/* ── ALERT ITEM ── */
.alert-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.alert-item:last-child { border-bottom: none; }
.alert-item:hover { background: var(--bg); }
.alert-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.alert-body { flex: 1; min-width: 0; }
.alert-title { font-size: 14px; font-weight: 600; color: var(--text); }
.alert-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.alert-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.alert-time { font-size: 11px; color: var(--muted); }
.alert-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; flex-shrink: 0; transition: all .15s; }
.alert-check:hover, .alert-check.done { background: var(--green-dot); border-color: var(--green-dot); color: #fff; }

/* ── NOTIF PRIORITY BADGE ── */
.pri-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── GLANCE PANEL ── */
.glance { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
.glance-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.glance-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.glance-row:last-child { border-bottom: none; }
.glance-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.glance-n { font-size: 18px; font-weight: 800; }
.glance-l { font-size: 11px; color: var(--muted); }

/* ── COMPANY CARD ── */
.company-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); position: relative; transition: transform .15s, box-shadow .15s; cursor: pointer; }
.company-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.company-card .cc-status { position: absolute; top: 14px; right: 14px; }
.cc-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; background: var(--blue-xlt); display: flex; align-items: center; justify-content: center; font-size: 26px; }
.cc-name { font-size: 15px; font-weight: 700; color: var(--text); }
.cc-type { font-size: 12px; color: var(--muted); margin-top: 1px; margin-bottom: 10px; }
.cc-check-list { list-style: none; }
.cc-check-list li { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 3px 0; }
.cc-check-list li .ci { font-size: 13px; }

/* ── FORMS ── */
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
input, select, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; outline: none; background: #fff; color: var(--text); transition: border-color .15s, box-shadow .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--blue-lt); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
textarea { min-height: 80px; resize: vertical; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--blue); color: #fff; box-shadow: 0 2px 6px rgba(29,78,216,.3); }
.btn-primary:hover { background: #1e40af; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red-lt); color: var(--red); }
.btn-danger:hover { background: #fecaca; }
.btn-green { background: var(--green-lt); color: var(--green); }
.btn-green:hover { background: #bbf7d0; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { width: 34px; height: 34px; padding: 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); display: inline-flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
.btn-icon:hover { background: var(--border); }

/* ── DONUT CHART (CSS only) ── */
.donut-wrap { display: flex; align-items: center; gap: 20px; }
.donut { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(var(--green-dot) 0% 67%, var(--amber) 67% 88%, var(--orange) 88% 97%, var(--red) 97% 100%); display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.donut::after { content: ''; width: 54px; height: 54px; background: #fff; border-radius: 50%; position: absolute; }
.donut-center { position: relative; z-index: 1; text-align: center; }
.donut-center .dn { font-size: 16px; font-weight: 800; }
.donut-center .dl { font-size: 9px; color: var(--muted); }
.donut-legend { flex: 1; }
.dl-row { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 3px 0; }
.dl-row strong { margin-left: auto; font-weight: 700; }

/* ── TREND LINE (CSS sparkline) ── */
.trend-wrap { height: 60px; background: linear-gradient(180deg, rgba(59,130,246,.05) 0%, transparent 100%); border-radius: 8px; display: flex; align-items: flex-end; gap: 3px; padding: 6px 8px 0; overflow: hidden; position: relative; }
.trend-bar { flex: 1; border-radius: 3px 3px 0 0; background: linear-gradient(180deg, var(--blue-lt), rgba(59,130,246,.4)); transition: height .3s; }
.trend-line { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

/* ── LOGIN ── */
#login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--navy3) 60%, #1e3a8a 100%); display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-box { background: rgba(255,255,255,.98); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.login-logo .li { width: 44px; height: 44px; background: var(--blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.login-brand { font-size: 22px; font-weight: 800; color: var(--text); }
.login-tagline { font-size: 13px; color: var(--muted); margin-bottom: 30px; }
.login-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.login-error { color: var(--red); font-size: 13px; margin-bottom: 10px; padding: 10px 12px; background: var(--red-lt); border-radius: 8px; }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
.modal { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-hd h3 { font-size: 16px; font-weight: 700; }
.modal-hd button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; }
.modal-hd button:hover { color: var(--text); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy2); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .2s, transform .2s; transform: translateY(8px); pointer-events: none; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px; }
#toast.show { opacity: 1; transform: none; }

/* ── SECTION HEADER ── */
.sec-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-hd h2 { font-size: 15px; font-weight: 700; }
.sec-hd a { font-size: 12px; color: var(--blue); cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 4px; }

/* ── GRID LAYOUTS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.dash-layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
.notif-layout { display: grid; grid-template-columns: 1fr 260px; gap: 16px; }

/* ── PILL FILTER ── */
.pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); transition: all .15s; }
.pill.active, .pill:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── SHIELD ICON SVG ── */
.shield-svg { display: inline-block; }

/* ── MOBILE ── */
#mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); border-top: 1px solid rgba(255,255,255,.1); z-index: 60; padding: 4px 0 8px; }
#mobile-nav .mn-tabs { display: flex; }
#mobile-nav .mn-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; cursor: pointer; color: rgba(255,255,255,.45); font-size: 10px; font-weight: 500; border-radius: 10px; margin: 0 4px; transition: color .15s, background .15s; }
#mobile-nav .mn-tab .mi { font-size: 19px; line-height: 1; }
#mobile-nav .mn-tab.active { color: #fff; background: rgba(255,255,255,.1); }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 48px 24px; }
.empty-state .ei { font-size: 40px; margin-bottom: 10px; }
.empty-state p { color: var(--muted); font-size: 14px; margin-top: 4px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) { .dash-layout { grid-template-columns: 1fr; } .notif-layout { grid-template-columns: 1fr; } }
@media (max-width: 680px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } .compliance-bar { flex-wrap: wrap; } .comp-seg { min-width: calc(50% - 3px); } }
@media (max-width: 640px) {
  #sidebar { display: none; }
  #topbar { left: 0 !important; }
  #main { margin-left: 0 !important; padding: 16px 12px 76px; }
  #mobile-nav { display: flex; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 641px) and (max-width: 820px) { .stat-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<!-- ── APP ── -->
<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="logo-icon">🛡️</div>
      <span class="logo-text">FineGuard</span>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item active" data-page="dashboard" onclick="nav('dashboard')">
      <div class="sb-icon">⊞</div><span class="sb-label">Dashboard</span>
    </div>
    <div class="sb-item" data-page="notifications" onclick="nav('notifications')" style="position:relative">
      <div class="sb-icon">🔔</div><span class="sb-label">Notifications</span>
      <span class="sb-badge">3</span>
    </div>
    <div class="sb-item" data-page="filings" onclick="nav('filings')">
      <div class="sb-icon">📄</div><span class="sb-label">Filings</span>
    </div>
    <div class="sb-item" data-page="portfolio" onclick="nav('portfolio')">
      <div class="sb-icon">🏢</div><span class="sb-label">Portfolio</span>
    </div>
    <div class="sb-item" data-page="decisions" onclick="nav('decisions')">
      <div class="sb-icon">⚖️</div><span class="sb-label">Decisions</span>
    </div>
    <div class="sb-item" data-page="teams" onclick="nav('teams')">
      <div class="sb-icon">👥</div><span class="sb-label">Teams</span>
    </div>
    <div class="sb-item" data-page="reports" onclick="nav('reports')">

function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function isOverdue(d) { return d && new Date(d) < new Date(new Date().toDateString()); }
function statusLabel(s) { return {compliant:'Compliant',risk:'At Risk',action:'Action Required',overdue:'Overdue'}[s]||s; }
function statusBadge(s) {
  const m = {compliant:'b-green',risk:'b-amber',action:'b-orange',overdue:'b-red'};
  return `<span class="badge ${m[s]||'b-gray'}">${statusLabel(s)}</span>`;
}
function priColor(p) { return {Low:'b-gray',Medium:'b-blue',High:'b-amber',Urgent:'b-red'}[p]||'b-gray'; }

function toast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function closeModal() { document.getElementById('modal')?.remove(); }
function showModal(html) {
  closeModal();
  const m = document.createElement('div');
  m.id = 'modal'; m.className = 'modal-bg';
  m.innerHTML = `<div class="modal">${html}</div>`;
  m.addEventListener('click', e=>{ if(e.target===m) closeModal(); });
  document.body.appendChild(m);
}

}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function markAllRead() {
  notifications.forEach(n=>n.read=true);
  toast('All notifications marked as read');
  nav('notifications');
}
function markDone(id) {
  const n = notifications.find(x=>x.id===id);
  if (n) { n.done=!n.done; toast(n.done?'Marked as done ✓':'Unmarked'); nav('notifications'); }
}

function resolveDecision(id, status) {
  const d = decisions.find(x=>x.id===id);
  if (d) { d.status=status; toast(`Decision: ${status} ✓`); nav('decisions'); }
}

function openFilingDetail(id) {
  const f = filings.find(x=>x.id===id);
  if (!f) return;
  showModal(`
  <div class="modal-hd">
    <h3>${esc(f.title)}</h3>
    <button onclick="closeModal()">×</button>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    ${statusBadge(f.status)}
    <span class="badge ${priColor(f.priority)}">${f.priority}</span>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">ENTITY</div><div style="font-weight:600">${esc(f.entity)}</div></div>
    <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">DUE DATE</div><div style="font-weight:600;color:${isOverdue(f.due)?'var(--red)':'var(--text)'}">${fmtDate(f.due)}</div></div>
  </div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:16px">${esc(f.sub)}</p>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="closeModal();toast('Filing marked complete ✓')">Mark Complete</button>
    <button class="btn btn-secondary" onclick="closeModal();toast('Reminder set ✓')">Set Reminder</button>
    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
  </div>`);
}

function openCompanyDetail(id) {
  const c = companies.find(x=>x.id===id);
  if (!c) return;
  showModal(`
  <div class="modal-hd">
    <h3>${esc(c.name)}</h3>
    <button onclick="closeModal()">×</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
    <div style="width:60px;height:60px;border-radius:50%;background:var(--blue-xlt);display:flex;align-items:center;justify-content:center;font-size:26px">${c.avatar}</div>
    <div>
      <div style="font-size:16px;font-weight:700">${esc(c.name)}</div>
      <div style="font-size:13px;color:var(--muted)">${esc(c.type)}</div>
      <div style="margin-top:4px">${c.status==='compliant'?'<span class="badge b-green">✓ Compliant</span>':'<span class="badge b-amber">⚠ Needs Attention</span>'}</div>
    </div>
  </div>
  <div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:16px">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase">Compliance Checklist</div>
    ${c.items.map((item,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><span>${c.ok[i]?'✅':'⚠️'}</span><span style="font-size:13px;flex:1">${item}</span><span style="font-size:12px;font-weight:600;color:${c.ok[i]?'var(--green)':'var(--orange)'}">${c.ok[i]?'Compliant':'Needs Review'}</span></div>`).join('')}
  </div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Primary contact: <strong>${esc(c.person)}</strong></p>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="closeModal();toast('Viewing filings for '+decodeURIComponent('${encodeURIComponent(c.name)}'))">View Filings</button>
    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
  </div>`);
}

function openNewAlert() {
  showModal(`
  <div class="modal-hd"><h3>New Compliance Alert</h3><button onclick="closeModal()">×</button></div>
  <div class="form-group"><label>Title *</label><input id="na-t" placeholder="e.g. Corporation Tax — Acme Ltd CT600"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-group"><label>Entity / Company</label><input id="na-co" placeholder="Client name"></div>
    <div class="form-group"><label>Due Date</label><input id="na-d" type="date"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-group"><label>Priority</label><select id="na-p"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></div>
    <div class="form-group"><label>Status</label><select id="na-s"><option value="compliant">Compliant</option><option value="risk">At Risk</option><option value="action" selected>Action Required</option><option value="overdue">Overdue</option></select></div>
  </div>
  <div class="form-group"><label>Notes</label><textarea id="na-n" placeholder="Context, reference numbers, next steps…"></textarea></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="createAlert()">Create Alert</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  </div>`);
}
function createAlert() {
  const t = document.getElementById('na-t')?.value.trim();
  if (!t) { toast('Title is required'); return; }
  filings.unshift({ id:'f'+Date.now(), title:t, sub:'New compliance obligation', entity:document.getElementById('na-co').value.trim()||'—', due:document.getElementById('na-d').value||null, status:document.getElementById('na-s').value, priority:document.getElementById('na-p').value });
  closeModal(); toast('Alert created ✓'); nav('filings');
}

function openNewFiling() { openNewAlert(); }

function changePassword() {
  const cur = document.getElementById('cur-pass')?.value;
  const nw = document.getElementById('new-pass')?.value;
  const cf = document.getElementById('conf-pass')?.value;
  if (!cur||!nw||!cf) { toast('All fields required'); return; }
  if (nw.length<8) { toast('New password must be 8+ characters'); return; }
  if (nw!==cf) { toast('Passwords do not match'); return; }
  toast('Password updated successfully ✓');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
nav('dashboard');
</script>
</body>
</html>
