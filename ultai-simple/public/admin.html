<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#06b6d4" />
  <link rel="icon" href="/icon-192.png" type="image/png" />
  <title>UltAi — Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0c10;
      --surface: #0f1117;
      --border:  rgba(255,255,255,0.07);
      --cyan:    #06b6d4;
      --blue:    #3b82f6;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --subtle:  #1e2130;
      --radius:  8px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; min-height: 100vh; line-height: 1.5;
      background-image:
        linear-gradient(rgba(6,182,212,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(11,12,16,0.9);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 20;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px; color: #fff;
    }
    .logo-name { font-weight: 700; font-size: 15px; }
    .logo-sub  { color: var(--muted); font-size: 12px; margin-left: 6px; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--cyan);
      background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.2);
      border-radius: 99px; padding: 2px 10px; margin-left: 8px;
    }
    .hdr-links { display: flex; align-items: center; gap: 16px; }
    .hdr-links a { color: var(--muted); font-size: 12px; text-decoration: none; }
    .hdr-links a:hover { color: var(--text); }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

    h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .sub-text { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    /* ── Stat cards ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    @media(max-width:640px) { .stats { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: rgba(15,17,23,0.7); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .stat-card:hover { border-color: rgba(6,182,212,0.2); }
    .stat-card.active-filter { border-color: currentColor; }
    .stat-number { font-size: 26px; font-weight: 800; }
    .stat-label  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    .s-new       { color: var(--cyan); }
    .s-contacted { color: #60a5fa; }
    .s-qualified { color: #34d399; }
    .s-closed    { color: var(--muted); }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted);
    }
    .search-wrap input {
      width: 100%; padding: 9px 12px 9px 34px;
      background: rgba(30,33,48,0.7); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--muted); opacity: 0.6; }
    .search-wrap input:focus { border-color: rgba(6,182,212,0.4); }

    select.ctrl, .btn-ctrl {
      padding: 9px 14px; background: rgba(30,33,48,0.7);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
      color: var(--text); font-size: 13px; outline: none; cursor: pointer;
      transition: border-color 0.2s; appearance: none;
    }
    select.ctrl:focus, .btn-ctrl:hover { border-color: rgba(6,182,212,0.3); }

    .btn-ctrl {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; white-space: nowrap;
    }
    .btn-export {
      background: rgba(30,33,48,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
    }

    /* ── Table ── */
    .table-wrap {
      background: rgba(15,17,23,0.6); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; backdrop-filter: blur(8px);
    }
    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 14px; text-align: left;
      font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td { padding: 11px 14px; font-size: 13px; white-space: nowrap; }

    .td-id  { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: rgba(6,182,212,0.7); }
    .td-co  { font-weight: 600; color: #fff; }
    .td-dim { color: var(--muted); }

    /* Status badge */
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; border-radius: 99px;
      padding: 3px 10px; white-space: nowrap;
    }
    .dot-s { width: 6px; height: 6px; border-radius: 50%; }
    .st-new       { background: rgba(6,182,212,0.12);  color: #67e8f9; }
    .st-contacted { background: rgba(96,165,250,0.12); color: #93c5fd; }
    .st-qualified { background: rgba(52,211,153,0.12); color: #6ee7b7; }
    .st-closed    { background: rgba(100,116,139,0.12);color: #94a3b8; }
    .dot-new       { background: #22d3ee; }
    .dot-contacted { background: #60a5fa; }
    .dot-qualified { background: #34d399; }
    .dot-closed    { background: #64748b; }

    /* Inline status select */
    select.status-sel {
      background: transparent; border: none; outline: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
      color: inherit; font-family: inherit; padding: 0;
    }

    /* Empty / loading */
    .empty {
      text-align: center; padding: 60px 24px;
      color: var(--muted); font-size: 13px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

    .count-bar { color: var(--muted); font-size: 12px; margin-top: 10px; }

    /* ── Detail panel ── */
    #detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    }
    #detail-overlay.open { display: flex; justify-content: flex-end; }
    #detail-panel {
      width: 100%; max-width: 440px; height: 100%;
      background: #0d0e14; border-left: 1px solid var(--border);
      overflow-y: auto; box-shadow: -16px 0 48px rgba(0,0,0,0.6);
    }
    .dp-header {
      position: sticky; top: 0; z-index: 5;
      background: rgba(13,14,20,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between;
    }
    .dp-id   { font-size: 11px; font-family: monospace; color: rgba(6,182,212,0.7); }
    .dp-name { font-size: 17px; font-weight: 700; color: #fff; margin-top: 2px; }
    .dp-close {
      background: none; border: none; color: var(--muted);
      font-size: 22px; cursor: pointer; line-height: 1; padding: 0; margin-left: 12px;
    }
    .dp-close:hover { color: var(--text); }
    .dp-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .dp-section h3 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .dp-row { margin-bottom: 10px; }
    .dp-row-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 3px; }
    .dp-row-val { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.5; }
    .dp-divider { height: 1px; background: var(--border); }
    .dp-status-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .dp-status-btn {
      font-size: 11px; font-weight: 600; padding: 6px 14px;
      border-radius: 6px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s; background: var(--subtle);
      color: var(--muted);
    }
    .dp-status-btn:hover:not(:disabled):not(.current) {
      border-color: rgba(255,255,255,0.12); color: var(--text);
    }
    .dp-status-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .dp-status-btn.current { cursor: default; }
    .dp-status-btn.current.st-new       { background: rgba(6,182,212,0.12);  color: #67e8f9; border-color: rgba(6,182,212,0.25); }
    .dp-status-btn.current.st-contacted { background: rgba(96,165,250,0.12); color: #93c5fd; border-color: rgba(96,165,250,0.25); }
    .dp-status-btn.current.st-qualified { background: rgba(52,211,153,0.12); color: #6ee7b7; border-color: rgba(52,211,153,0.25); }
    .dp-status-btn.current.st-closed    { background: rgba(100,116,139,0.12);color: #94a3b8; border-color: rgba(100,116,139,0.25); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e2130; border: 1px solid rgba(6,182,212,0.3);
      color: var(--text); padding: 10px 20px; border-radius: 8px;
      font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
      white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">U</div>
    <span class="logo-name">UltAi</span>
    <span class="logo-sub">/ Admin</span>
    <span class="badge">Intake Queue</span>
  </div>
  <div class="hdr-links">
    <a href="/form.html">↗ View Form</a>
    <a href="/api/admin/ultai-intakes/export" id="export-link">⬇ Export CSV</a>
  </div>
</header>

<main>
  <h1>Intake Submissions</h1>
  <p class="sub-text">Review, filter, and manage UltAi consultation requests.</p>

  <!-- Stat cards -->
  <div class="stats">
    <div class="stat-card s-new" id="card-new" onclick="filterStatus('new')">
      <div class="stat-number" id="cnt-new">—</div>
      <div class="stat-label">New</div>
    </div>
    <div class="stat-card s-contacted" id="card-contacted" onclick="filterStatus('contacted')">
      <div class="stat-number" id="cnt-contacted">—</div>
      <div class="stat-label">Contacted</div>
    </div>
    <div class="stat-card s-qualified" id="card-qualified" onclick="filterStatus('qualified')">
      <div class="stat-number" id="cnt-qualified">—</div>
      <div class="stat-label">Qualified</div>
    </div>
    <div class="stat-card s-closed" id="card-closed" onclick="filterStatus('closed')">
      <div class="stat-number" id="cnt-closed">—</div>
      <div class="stat-label">Closed</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search-input" placeholder="Search company, contact, email, or ID…"
        oninput="onSearch()" />
    </div>
    <select class="ctrl" id="status-filter" onchange="onStatusFilter()">
      <option value="all">All statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="qualified">Qualified</option>
      <option value="closed">Closed</option>
    </select>
    <button class="btn-ctrl btn-export" onclick="location.href='/api/admin/ultai-intakes/export'">
      ⬇ Export CSV
    </button>
    <button class="btn-ctrl" onclick="load()" style="border-color:rgba(6,182,212,0.2);color:var(--cyan)">
      ↻ Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Company</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Industry</th>
            <th>Status</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="7"><div class="empty"><div class="empty-icon">⏳</div>Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="count-bar" id="count-bar"></div>
</main>

<!-- Detail overlay -->
<div id="detail-overlay" onclick="closeDetail(event)">
  <div id="detail-panel"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let allIntakes = [];   // full unfiltered list — used for stats
  let viewIntakes = [];  // filtered list — used for table
  let currentStatus = 'all';
  let currentSearch = '';
  let detailId = null;

  const STATUS_LABEL = { new:'New', contacted:'Contacted', qualified:'Qualified', closed:'Closed' };

  function toast(msg, err) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = err ? 'rgba(239,68,68,0.15)' : '';
    el.style.borderColor = err ? 'rgba(239,68,68,0.3)' : '';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  async function load() {
    try {
      // Always fetch the full list so stat cards show global totals.
      const res = await fetch('/api/admin/ultai-intakes');
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      allIntakes = json.intakes;
      applyFilters();
    } catch (e) {
      toast(e.message || 'Failed to load', true);
    }
  }

  function applyFilters() {
    let rows = allIntakes;
    if (currentStatus !== 'all') rows = rows.filter(r => r.status === currentStatus);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      rows = rows.filter(r =>
        (r.company_name || '').toLowerCase().includes(q) ||
        (r.contact_name || '').toLowerCase().includes(q) ||
        (r.email        || '').toLowerCase().includes(q) ||
        (r.id           || '').toLowerCase().includes(q)
      );
    }
    viewIntakes = rows;
    renderStats();
    renderTable();
  }

  function renderStats() {
    // Always count from the full unfiltered list.
    document.getElementById('cnt-new').textContent       = allIntakes.filter(r => r.status === 'new').length;
    document.getElementById('cnt-contacted').textContent = allIntakes.filter(r => r.status === 'contacted').length;
    document.getElementById('cnt-qualified').textContent = allIntakes.filter(r => r.status === 'qualified').length;
    document.getElementById('cnt-closed').textContent    = allIntakes.filter(r => r.status === 'closed').length;
  }

  function renderTable() {
    const tbody = document.getElementById('tbl-body');
    const rows = viewIntakes;

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty">
        <div class="empty-icon">○</div>No submissions found</div></td></tr>`;
      document.getElementById('count-bar').textContent = '';
      return;
    }

    document.getElementById('count-bar').textContent = `${rows.length} submission${rows.length !== 1 ? 's' : ''} shown`;

    tbody.innerHTML = rows.map(r => `
      <tr onclick="openDetail('${r.id}')">
        <td class="td-id">${esc(r.id)}</td>
        <td class="td-co">${esc(r.company_name)}</td>
        <td class="td-dim">${esc(r.contact_name)}</td>
        <td class="td-dim">${esc(r.email)}</td>
        <td class="td-dim">${esc(r.industry || '—')}</td>
        <td>
          <span class="badge-status st-${esc(r.status)}" onclick="event.stopPropagation()">
            <span class="dot-s dot-${esc(r.status)}"></span>
            <select class="status-sel" data-id="${esc(r.id)}"
              onchange="quickStatus(this)" onclick="event.stopPropagation()">
              ${['new','contacted','qualified','closed'].map(s =>
                `<option value="${s}"${r.status===s?' selected':''}>${STATUS_LABEL[s]}</option>`
              ).join('')}
            </select>
          </span>
        </td>
        <td class="td-dim">${fmtDate(r.created_at)}</td>
      </tr>
    `).join('');
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function fmtDate(s) {
    if (!s) return '—';
    const d = new Date(s.endsWith('Z') ? s : s + 'Z');
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  async function quickStatus(sel) {
    const id = sel.dataset.id;
    const status = sel.value;
    try {
      const res = await fetch(`/api/admin/ultai-intakes/${encodeURIComponent(id)}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      allIntakes = allIntakes.map(r => r.id === id ? { ...r, status } : r);
      applyFilters();
      toast('Status updated');
    } catch (e) {
      toast(e.message || 'Update failed', true);
      load();
    }
  }

  function onSearch() {
    currentSearch = document.getElementById('search-input').value.trim();
    applyFilters();
  }

  function onStatusFilter() {
    currentStatus = document.getElementById('status-filter').value;
    renderStatCards();
    applyFilters();
  }

  function filterStatus(s) {
    currentStatus = (currentStatus === s) ? 'all' : s;
    document.getElementById('status-filter').value = currentStatus;
    renderStatCards();
    load();
  }

  function renderStatCards() {
    ['new','contacted','qualified','closed'].forEach(s => {
      document.getElementById(`card-${s}`).classList.toggle('active-filter', currentStatus === s);
    });
  }

  // ── Detail panel ──

  function openDetail(id) {
    const r = allIntakes.find(x => x.id === id);
    if (!r) return;
    detailId = id;
    const panel = document.getElementById('detail-panel');
    panel.innerHTML = buildDetail(r);
    document.getElementById('detail-overlay').classList.add('open');
  }

  function buildDetail(r) {
    const row = (label, val) => val
      ? `<div class="dp-row"><div class="dp-row-label">${label}</div><div class="dp-row-val">${esc(val)}</div></div>`
      : '';

    const statusBtns = ['new','contacted','qualified','closed'].map(s => `
      <button class="dp-status-btn st-${s}${r.status===s?' current':''}"
        onclick="detailStatus('${r.id}','${s}')"
        ${r.status===s?'disabled':''}>
        ${STATUS_LABEL[s]}
      </button>`).join('');

    return `
      <div class="dp-header">
        <div>
          <div class="dp-id">${esc(r.id)}</div>
          <div class="dp-name">${esc(r.company_name)}</div>
        </div>
        <button class="dp-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="dp-body">
        <div class="dp-section">
          <h3>Status</h3>
          <div class="dp-status-row">${statusBtns}</div>
        </div>
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Contact</h3>
          ${row('Contact Name', r.contact_name)}
          ${row('Email', r.email)}
          ${row('Phone', r.phone)}
          ${row('Website', r.website)}
        </div>
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Company</h3>
          ${row('Industry', r.industry)}
          ${row('Company Size', r.company_size)}
        </div>
        ${r.business_context ? `
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Business Context</h3>
          ${row('Details', r.business_context)}
        </div>` : ''}
        ${r.challenges ? `
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Challenges</h3>
          ${row('Details', r.challenges)}
        </div>` : ''}
        ${r.tech_stack ? `
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Technology</h3>
          ${row('Details', r.tech_stack)}
        </div>` : ''}
        ${r.goals_timeline ? `
        <div class="dp-divider"></div>
        <div class="dp-section">
          <h3>Goals &amp; Timeline</h3>
          ${row('Details', r.goals_timeline)}
        </div>` : ''}
        <div class="dp-divider"></div>
        <div class="dp-row">
          <div class="dp-row-label">Submitted</div>
          <div class="dp-row-val" style="color:var(--muted)">${fmtDate(r.created_at)}</div>
        </div>
      </div>`;
  }

  async function detailStatus(id, status) {
    try {
      const res = await fetch(`/api/admin/ultai-intakes/${encodeURIComponent(id)}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      allIntakes = allIntakes.map(r => r.id === id ? { ...r, status } : r);
      applyFilters();
      const updated = allIntakes.find(r => r.id === id);
      if (updated) {
        document.getElementById('detail-panel').innerHTML = buildDetail(updated);
      }
      toast('Status updated');
    } catch (e) {
      toast(e.message || 'Update failed', true);
    }
  }

  function closeDetail(ev) {
    if (ev && ev.target !== document.getElementById('detail-overlay')) return;
    document.getElementById('detail-overlay').classList.remove('open');
    detailId = null;
  }

  // ── Init ──
  load();
</script>
</body>
</html>
