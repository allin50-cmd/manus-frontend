<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <!-- Outer shield glow ring -->
    <radialGradient id="shieldOuter" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </radialGradient>
    <!-- Inner shield deep blue -->
    <linearGradient id="shieldInner" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <!-- Gloss highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="30%" y2="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Icon glow -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1E40AF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer shield (light blue border) -->
  <path d="M100 8 L175 38 L175 110 C175 155 140 185 100 200 C60 185 25 155 25 110 L25 38 Z"
        fill="url(#shieldOuter)" filter="url(#shadow)"/>

  <!-- Inner shield (dark blue) -->
  <path d="M100 20 L163 46 L163 110 C163 148 133 174 100 187 C67 174 37 148 37 110 L37 46 Z"
        fill="url(#shieldInner)"/>

  <!-- Gloss overlay -->
  <path d="M100 20 L163 46 L163 95 Q130 50 100 20 Q70 50 37 95 L37 46 Z"
        fill="url(#gloss)" opacity="0.6"/>

  <!-- Glow spot behind icon -->
  <ellipse cx="100" cy="105" rx="38" ry="38" fill="url(#iconGlow)" opacity="0.25"/>

  <!-- Document body (white) -->
  <rect x="83" y="72" width="34" height="44" rx="3" fill="white"/>
  <!-- Dog-ear fold -->
  <polygon points="107,72 117,72 117,82" fill="#DBEAFE"/>
  <line x1="107" y1="72" x2="107" y2="82" stroke="#DBEAFE" stroke-width="1"/>
  <line x1="107" y1="82" x2="117" y2="82" stroke="#DBEAFE" stroke-width="1"/>

  <!-- Left wing -->
  <path d="M83 103 C75 100 62 98 52 104 C60 108 72 108 83 108 Z" fill="white" opacity="0.95"/>
  <path d="M83 109 C73 107 60 108 50 116 C60 118 74 115 83 112 Z" fill="white" opacity="0.75"/>
  <path d="M83 115 C74 114 63 118 56 127 C65 127 76 122 83 118 Z" fill="white" opacity="0.5"/>

  <!-- Right wing -->
  <path d="M117 103 C125 100 138 98 148 104 C140 108 128 108 117 108 Z" fill="white" opacity="0.95"/>
  <path d="M117 109 C127 107 140 108 150 116 C140 118 126 115 117 112 Z" fill="white" opacity="0.75"/>
  <path d="M117 115 C126 114 137 118 144 127 C135 127 124 122 117 118 Z" fill="white" opacity="0.5"/>

  <!-- Bottom U emblem -->
  <text x="100" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="11"
        font-weight="bold" fill="#93C5FD" letter-spacing="1">u</text>

  <!-- "Fine" text - dark navy -->
  <text x="52" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="32"
        font-weight="800" fill="#1E3A8A" letter-spacing="-0.5">Fine</text>

  <!-- "Guard" text - light blue -->
  <text x="104" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="32"
        font-weight="800" fill="#38BDF8" letter-spacing="-0.5">Guard</text>
</svg>
