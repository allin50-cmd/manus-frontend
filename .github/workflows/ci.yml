name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  ci:
    name: Install · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --prefer-offline

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Type-check server
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
