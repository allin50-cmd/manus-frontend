name: FineGuard Pro — CI/CD → Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: '1'

# ── Job 1: Test ───────────────────────────────────────────────────────────────
# Runs TypeScript check + full test suite on every push/PR.
# No secrets required — runs on any branch, any trigger.
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the Temporal test-server binary (~80 MB).
      # Without this, the binary is re-downloaded on every CI run.
      # Keyed on package-lock.json so it refreshes when @temporalio/testing
      # is upgraded.
      - name: Cache Temporal test server binary
        uses: actions/cache@v4
        with:
          path: /tmp/temporal-test-server-sdk-typescript-*
          key: temporal-test-server-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            temporal-test-server-${{ runner.os }}-

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

# ── Job 2: Build ──────────────────────────────────────────────────────────────
# Produces the Next.js standalone package and uploads it as a workflow artifact.
# The artifact is reused by deploy-web — no double-build.
# No environment context here — secrets are only needed at deploy time.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
          # NEXT_PHASE tells src/lib/env.ts to skip DATABASE_URL validation
          # during the build (it is not available in the build environment).
          NEXT_PHASE: phase-production-build
          # NEXT_PUBLIC_BASE_URL is baked into client bundles.
          # Falls back to empty string when the secret is not set — the actual
          # URL is set as an App Service env var at runtime, which overrides it.
          NEXT_PUBLIC_BASE_URL: ${{ secrets.APP_URL }}

      - name: Assemble standalone package
        run: |
          # Static assets and public/ are not included in standalone automatically.
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public

          # Startup wrapper: sets HOSTNAME=0.0.0.0 so Next.js listens on all
          # interfaces (required for Azure App Service — the default is localhost
          # which causes TCP RST on all incoming connections).
          # Using printf instead of heredoc to avoid YAML indentation issues
          # (a heredoc's closing delimiter must be at column 0; YAML indentation
          # adds leading spaces that prevent the shell from recognising EOF).
          printf '#!/bin/sh\nset -eu\nexport HOSTNAME=0.0.0.0\nexport PORT=${PORT:-8080}\nnode server.js\n' \
            > .next/standalone/startup.sh
          chmod +x .next/standalone/startup.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ github.sha }}
          path: .next/standalone
          retention-days: 1

# ── Job 3: Migrate ────────────────────────────────────────────────────────────
# Runs SQL migrations before code is deployed.
# Requires the production/staging environment (has DATABASE_URL secret).
  migrate:
    name: Migrate database
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify DATABASE_URL
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "ERROR: DATABASE_URL secret is not set in the '${{ github.event.inputs.environment || 'production' }}' environment."
            echo "Add it in: Settings → Environments → ${{ github.event.inputs.environment || 'production' }} → Secrets"
            exit 1
          fi

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

# ── Job 4: Deploy web ─────────────────────────────────────────────────────────
# Downloads the pre-built artifact and deploys to Azure App Service.
# Runs a health check after deploy.
  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Verify deploy secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AZURE_WEBAPP_NAME }}"            ] && MISSING="$MISSING AZURE_WEBAPP_NAME"
          [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && MISSING="$MISSING AZURE_WEBAPP_PUBLISH_PROFILE"
          [ -z "${{ secrets.APP_URL }}"                      ] && MISSING="$MISSING APP_URL"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing required secrets:$MISSING"
            echo "Add them in: Settings → Environments → ${{ github.event.inputs.environment || 'production' }} → Secrets"
            exit 1
          fi

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: standalone-${{ github.sha }}
          path: standalone

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: standalone
          startup-command: 'sh startup.sh'

      - name: Health check
        # 10 attempts, 8 s apart → waits up to ~80 s for the app to come up.
        run: |
          curl -fsS \
            --retry 10 \
            --retry-delay 8 \
            --retry-connrefused \
            "${{ secrets.APP_URL }}/api/health"

      - name: Record deployment
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failed")
          curl -sf -X POST "${{ secrets.APP_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"${{ github.event.inputs.environment || 'production' }}\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || true

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.event.inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ secrets.APP_URL }} |" >> $GITHUB_STEP_SUMMARY

# ── Job 5: Deploy worker (optional) ──────────────────────────────────────────
# continue-on-error so a missing AZURE_WORKER_APP_NAME doesn't block web deploy.
# Remove continue-on-error once the worker App Service is provisioned.
  deploy-worker:
    name: Deploy worker (optional)
    runs-on: ubuntu-latest
    needs: [build, migrate, deploy-web]
    environment: ${{ github.event.inputs.environment || 'production' }}
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build worker Docker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t fineguard-worker:${{ github.sha }} \
            .

      - name: Deploy worker to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          images: fineguard-worker:${{ github.sha }}
          startup-command: 'node dist/temporal/worker.js'

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Worker" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
