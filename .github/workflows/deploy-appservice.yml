name: FineGuard Pro — CI/CD → Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: '1'

# ── Job 1: Test ───────────────────────────────────────────────────────────────
# Runs TypeScript check + full test suite on every push.
# All downstream jobs are blocked until this passes.
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

# ── Job 2: Build ──────────────────────────────────────────────────────────────
# Produces the Next.js standalone package and uploads it as a workflow artifact.
# The artifact is reused by deploy-web — no double-build.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "ERROR: APP_URL secret is not set"
            exit 1
          fi

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
          # Set automatically by `next build`; explicit here as belt-and-suspenders
          # for the TEMPORAL_ADDRESS localhost guard in src/lib/env.ts.
          NEXT_PHASE: phase-production-build
          # Baked into client bundles at build time — must match the live hostname.
          NEXT_PUBLIC_BASE_URL: ${{ secrets.APP_URL }}

      - name: Assemble standalone package
        run: |
          # Static assets and public/ are not included in standalone output automatically.
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public

          # Write a startup wrapper that sets HOSTNAME and PORT before delegating
          # to the Next.js standalone server. Azure App Service forwards traffic
          # to WEBSITES_PORT (default 8080); server.js must listen on 0.0.0.0.
          cat > .next/standalone/startup.sh << 'EOF'
          #!/bin/sh
          set -eu
          export HOSTNAME=0.0.0.0
          export PORT=${PORT:-8080}
          node server.js
          EOF
          chmod +x .next/standalone/startup.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ github.sha }}
          path: .next/standalone
          retention-days: 1

# ── Job 3: Migrate ────────────────────────────────────────────────────────────
# Runs SQL migrations before any code is deployed.
# Schema is always ahead of the running code.
  migrate:
    name: Migrate database
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify DATABASE_URL
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "ERROR: DATABASE_URL secret is not set"
            exit 1
          fi

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

# ── Job 4: Deploy web ─────────────────────────────────────────────────────────
# Downloads the pre-built artifact and deploys to Azure App Service.
# Runs a health check after deploy — fails the job if the app does not return 200.
  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Verify deploy secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AZURE_WEBAPP_NAME }}"           ] && MISSING="$MISSING AZURE_WEBAPP_NAME"
          [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && MISSING="$MISSING AZURE_WEBAPP_PUBLISH_PROFILE"
          [ -z "${{ secrets.APP_URL }}"                     ] && MISSING="$MISSING APP_URL"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: standalone-${{ github.sha }}
          path: standalone

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: standalone
          startup-command: 'sh startup.sh'

      - name: Health check
        # Uses curl built-in retry: 10 attempts, 8s between retries (max ~80s wait).
        # Returns non-zero if the app never responds with 2xx, failing this job.
        run: |
          curl -fsS \
            --retry 10 \
            --retry-delay 8 \
            --retry-connrefused \
            "${{ secrets.APP_URL }}/api/health"

      - name: Record deployment
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failed")
          curl -sf -X POST "${{ secrets.APP_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"${{ github.event.inputs.environment || 'production' }}\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || true

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.event.inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ secrets.APP_URL }} |" >> $GITHUB_STEP_SUMMARY

# ── Job 5: Deploy worker (optional) ──────────────────────────────────────────
# Deploys the Temporal compliance worker to a separate App Service.
# continue-on-error: true — a missing AZURE_WORKER_APP_NAME secret does not
# fail the workflow run or block the web deployment.
# Remove continue-on-error once the worker App Service is provisioned.
  deploy-worker:
    name: Deploy worker (optional)
    runs-on: ubuntu-latest
    needs: [build, migrate, deploy-web]
    environment: ${{ github.event.inputs.environment || 'production' }}
    continue-on-error: true   # ← remove once AZURE_WORKER_APP_NAME is provisioned

    steps:
      - uses: actions/checkout@v4

      - name: Build worker Docker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t fineguard-worker:${{ github.sha }} \
            .

      - name: Deploy worker to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          images: fineguard-worker:${{ github.sha }}
          startup-command: 'node dist/temporal/worker.js'

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Worker" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
