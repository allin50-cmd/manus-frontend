name: Deploy VaultLine Brand Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: Deploy to Azure App Service
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Record deployment status
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failed"; fi

          curl -s -X POST "${{ secrets.VAULTLINE_API_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"environment\": \"${{ github.event.inputs.environment || 'dev' }}\",
              \"status\": \"$STATUS\",
              \"commit\": \"${{ github.sha }}\",
              \"workflowRun\": \"${{ github.run_id }}\"
            }" || echo "Deployment recording failed (non-critical)"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deploy — ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
