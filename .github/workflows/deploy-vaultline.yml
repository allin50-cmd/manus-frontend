# ============================================================================
# VaultLine Brand Suite – Unified CI/CD Pipeline
# Builds Docker image → pushes to Azure Container Registry → deploys to
# Azure App Service (Linux containers) across dev / staging / prod
# ============================================================================

name: CI/CD – Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: vaultline-brand-suite

# ============================================================================
jobs:

  # --------------------------------------------------------------------------
  # 1. LINT & TYPE-CHECK
  # --------------------------------------------------------------------------
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Type-check
        run: npm run type-check

  # --------------------------------------------------------------------------
  # 2. BUILD & E2E TEST
  # --------------------------------------------------------------------------
  build:
    name: Build & E2E Test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Run E2E tests
        run: npx playwright test --reporter=line
        env:
          CI: true

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # --------------------------------------------------------------------------
  # 3. DOCKER BUILD & PUSH TO ACR
  # --------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # --------------------------------------------------------------------------
  # 4. DEPLOY TO DEV (auto on main push)
  # --------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev
    needs: docker
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to App Service (dev)
        run: |
          APP="${{ secrets.AZURE_WEBAPP_NAME_DEV }}"
          RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv 2>/dev/null || true)
          if [ -z "$RG" ] || [ -z "$APP" ]; then
            echo "::error::Could not determine resource group for $APP"
            exit 1
          fi
          echo "Deploying to $APP in $RG"
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query "username" -o tsv 2>/dev/null || echo "${{ secrets.ACR_USERNAME }}")
          ACR_PWD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv 2>/dev/null || echo "${{ secrets.ACR_PASSWORD }}")
          echo "ACR_USER resolved: ${ACR_USER:0:4}... (truncated)"
          # Set app settings first so WEBSITES_PORT is ready before container starts
          az webapp config appsettings set \
            --name "$APP" \
            --resource-group "$RG" \
            --settings WEBSITES_PORT=8080 NODE_ENV=production \
            --output none
          # Single atomic call: sets image + registry credentials together.
          # This triggers exactly ONE container restart, already authenticated.
          # (Avoids the two-restart race where webapps-deploy fires first without creds.)
          az webapp config container set \
            --name "$APP" \
            --resource-group "$RG" \
            --docker-custom-image-name "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-registry-server-user "$ACR_USER" \
            --docker-registry-server-password "$ACR_PWD" \
            --output none
          echo "=== Verifying stored container config ==="
          az webapp config container show \
            --name "$APP" \
            --resource-group "$RG" \
            --query "{image:DOCKER_CUSTOM_IMAGE_NAME,registryUrl:DOCKER_REGISTRY_SERVER_URL,registryUser:DOCKER_REGISTRY_SERVER_USERNAME}" \
            -o json 2>/dev/null || true
          echo "Container deployed and configured."

      - name: Record deployment
        if: always()
        run: |
          STATUS="success"
          [ "${{ job.status }}" != "success" ] && STATUS="failed"
          curl -sS -X POST "${{ secrets.VAULTLINE_API_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"dev\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || true

      - name: Smoke test
        run: |
          echo "Waiting 90s for container cold-start..."
          sleep 90
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://${{ secrets.AZURE_WEBAPP_NAME_DEV }}.azurewebsites.net/api/health" || true)
            [ "$CODE" = "200" ] && echo "Health check passed on attempt $i" && exit 0
            echo "Attempt $i: HTTP $CODE – retrying in 30s..."
            sleep 30
          done
          echo "::warning::Health check did not return 200 after 10 attempts (~6 min)"

      - name: Dump container logs (dev)
        if: always()
        run: |
          APP="${{ secrets.AZURE_WEBAPP_NAME_DEV }}"
          RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv 2>/dev/null || true)
          if [ -n "$RG" ] && [ -n "$APP" ]; then
            echo "=== Enabling app logging ==="
            az webapp log config --name "$APP" --resource-group "$RG" \
              --application-logging filesystem --docker-container-logging filesystem \
              --level information --output none 2>/dev/null || true
            echo "=== Downloading container logs ==="
            az webapp log download --name "$APP" --resource-group "$RG" \
              --log-file /tmp/webapp-logs.zip 2>/dev/null || true
            if [ -f /tmp/webapp-logs.zip ]; then
              unzip -q /tmp/webapp-logs.zip -d /tmp/webapp-logs/ 2>/dev/null || true
              echo "=== Container stdout/stderr ==="
              find /tmp/webapp-logs -name "*.log" | xargs cat 2>/dev/null | tail -100 || true
            fi
            echo "=== App Service properties ==="
            az webapp show --name "$APP" --resource-group "$RG" \
              --query "{state:state,defaultHostName:defaultHostName,containerSettings:siteConfig.linuxFxVersion}" \
              -o table 2>/dev/null || true
          fi

  # --------------------------------------------------------------------------
  # 5. DEPLOY TO STAGING (manual dispatch only)
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: docker
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to App Service (staging)
        run: |
          APP="${{ secrets.AZURE_WEBAPP_NAME_STAGING }}"
          RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv 2>/dev/null || true)
          if [ -z "$RG" ] || [ -z "$APP" ]; then
            echo "::error::Could not determine resource group for $APP"
            exit 1
          fi
          echo "Deploying to $APP in $RG"
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query "username" -o tsv 2>/dev/null || echo "${{ secrets.ACR_USERNAME }}")
          ACR_PWD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv 2>/dev/null || echo "${{ secrets.ACR_PASSWORD }}")
          az webapp config appsettings set \
            --name "$APP" \
            --resource-group "$RG" \
            --settings WEBSITES_PORT=8080 NODE_ENV=production \
            --output none
          az webapp config container set \
            --name "$APP" \
            --resource-group "$RG" \
            --docker-custom-image-name "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-registry-server-user "$ACR_USER" \
            --docker-registry-server-password "$ACR_PWD" \
            --output none
          echo "Container deployed and configured."

      - name: Record deployment
        if: always()
        run: |
          STATUS="success"
          [ "${{ job.status }}" != "success" ] && STATUS="failed"
          curl -sS -X POST "${{ secrets.VAULTLINE_API_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"staging\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || true

      - name: Smoke test
        run: |
          echo "Waiting 90s for container cold-start..."
          sleep 90
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://${{ secrets.AZURE_WEBAPP_NAME_STAGING }}.azurewebsites.net/api/health" || true)
            [ "$CODE" = "200" ] && echo "Health check passed on attempt $i" && exit 0
            echo "Attempt $i: HTTP $CODE – retrying in 30s..."
            sleep 30
          done
          echo "::warning::Health check did not return 200 after 10 attempts (~6 min)"

  # --------------------------------------------------------------------------
  # 6. DEPLOY TO PRODUCTION (manual only, requires GitHub environment approval)
  # --------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: docker
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to App Service (prod)
        run: |
          APP="${{ secrets.AZURE_WEBAPP_NAME_PROD }}"
          RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv 2>/dev/null || true)
          if [ -z "$RG" ] || [ -z "$APP" ]; then
            echo "::error::Could not determine resource group for $APP"
            exit 1
          fi
          echo "Deploying to $APP in $RG"
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query "username" -o tsv 2>/dev/null || echo "${{ secrets.ACR_USERNAME }}")
          ACR_PWD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv 2>/dev/null || echo "${{ secrets.ACR_PASSWORD }}")
          az webapp config appsettings set \
            --name "$APP" \
            --resource-group "$RG" \
            --settings WEBSITES_PORT=8080 NODE_ENV=production \
            --output none
          az webapp config container set \
            --name "$APP" \
            --resource-group "$RG" \
            --docker-custom-image-name "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-registry-server-user "$ACR_USER" \
            --docker-registry-server-password "$ACR_PWD" \
            --output none
          echo "Container deployed and configured."

      - name: Record deployment
        if: always()
        run: |
          STATUS="success"
          [ "${{ job.status }}" != "success" ] && STATUS="failed"
          curl -sS -X POST "${{ secrets.VAULTLINE_API_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"prod\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || true

      - name: Smoke test
        run: |
          echo "Waiting 90s for container cold-start..."
          sleep 90
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://${{ secrets.AZURE_WEBAPP_NAME_PROD }}.azurewebsites.net/api/health" || true)
            [ "$CODE" = "200" ] && echo "Health check passed on attempt $i" && exit 0
            echo "Attempt $i: HTTP $CODE – retrying in 30s..."
            sleep 30
          done
          echo "::error::Production health check failed after 10 attempts (~6 min)"
          exit 1

  # --------------------------------------------------------------------------
  # 7. SUMMARY
  # --------------------------------------------------------------------------
  summary:
    name: Summary
    needs: [quality, build, docker, deploy-dev, deploy-staging, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## VaultLine CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & E2E | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dev | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Prod | ${{ needs.deploy-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
