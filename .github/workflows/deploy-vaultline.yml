name: Deploy VaultLine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_profile: ${{ steps.check.outputs.has_profile }}
    steps:
      - id: check
        shell: bash
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -n "$PROFILE" ]; then
            echo "has_profile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_profile=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: preflight
    runs-on: ubuntu-latest
    name: Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check client
        run: npm run type-check

      - name: Type-check server
        run: npm run type-check:server

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          COMPANIES_HOUSE_API_KEY: placeholder-ci-build-only

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Web App
    needs: [preflight, build]
    if: needs.preflight.outputs.has_profile == 'true' && vars.AZURE_WEBAPP_NAME != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
