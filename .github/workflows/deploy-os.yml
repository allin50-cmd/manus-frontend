name: Deploy Unified Intelligence OS

on:
  push:
    branches:
      - main
    paths:
      - 'os/**'
      - 'infra/main.bicep'
      - '.github/workflows/deploy-os.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: unified-intelligence-os
  RESOURCE_GROUP: rg-unified-os
  ENVIRONMENT_NAME: aios
  LOCATION: uksouth

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: os/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run type-check
      - run: npm test

  build-and-deploy:
    name: Build image and deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        working-directory: os
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$TAG -t ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$TAG
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            environmentName=${{ env.ENVIRONMENT_NAME }}
            location=${{ env.LOCATION }}
            acrLoginServer=${{ secrets.ACR_LOGIN_SERVER }}
            osImageTag=${{ env.IMAGE_TAG }}
            dbPassword=${{ secrets.DB_PASSWORD }}
            openaiKey=${{ secrets.OPENAI_API_KEY }}
            resendKey=${{ secrets.RESEND_KEY }}
            stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }}
            companiesHouseApiKey=${{ secrets.COMPANIES_HOUSE_API_KEY }}
            webhookSigningSecret=${{ secrets.WEBHOOK_SIGNING_SECRET }}
            crmWebhookUrl=${{ secrets.CRM_WEBHOOK_URL }}

      - name: Run Prisma migrations
        working-directory: os
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm ci
          npx prisma migrate deploy

      - name: Output URL
        run: |
          FQDN=$(az containerapp show -n os-$ENVIRONMENT_NAME -g $RESOURCE_GROUP --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to https://$FQDN"
