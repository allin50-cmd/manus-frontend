###############################################################################
# FineGuard MTD — CI Pipeline
###############################################################################
name: FineGuard CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check client
        run: npm run type-check

      - name: Type-check server (strict)
        run: npm run type-check:server

      - name: Run tests
        run: npm test
        env:
          LOCAL_ENCRYPTION_KEY: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
        # Integration tests skip cleanly when DATABASE_URL is absent.

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          COMPANIES_HOUSE_API_KEY: placeholder-ci-build-only
