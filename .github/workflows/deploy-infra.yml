name: Deploy ClerkOS Infrastructure (Bicep)

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

jobs:
  deploy-infra:
    name: Bicep deployment — ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set environment
        id: env
        run: |
          ENV=${{ github.event.inputs.environment || 'dev' }}
          echo "name=$ENV" >> $GITHUB_OUTPUT
          echo "rg=rg-clerkos-${ENV}" >> $GITHUB_OUTPUT

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ steps.env.outputs.rg }} \
            --location uksouth \
            --output none

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group ${{ steps.env.outputs.rg }} \
            --template-file deploy/main.bicep \
            --parameters @deploy/parameters.${{ steps.env.outputs.name }}.json

      - name: Deploy infrastructure
        id: deploy
        run: |
          az deployment group create \
            --resource-group ${{ steps.env.outputs.rg }} \
            --template-file deploy/main.bicep \
            --parameters @deploy/parameters.${{ steps.env.outputs.name }}.json \
            --name clerkos-${{ steps.env.outputs.name }}-${{ github.run_number }} \
            --output json > deploy-output.json

          # Surface key outputs
          API_URL=$(jq -r '.properties.outputs.containerAppUrl.value' deploy-output.json)
          WEB_URL=$(jq -r '.properties.outputs.staticWebAppUrl.value' deploy-output.json)
          ACR=$(jq -r '.properties.outputs.acrLoginServer.value' deploy-output.json)
          PG=$(jq -r '.properties.outputs.pgServerFqdn.value' deploy-output.json)

          echo "### Infrastructure deployed — ${{ steps.env.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${API_URL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${WEB_URL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ACR | \`${ACR}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL FQDN | \`${PG}\` |" >> $GITHUB_STEP_SUMMARY
