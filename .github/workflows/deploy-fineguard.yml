name: Deploy FineGuard Pro → Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Migrate ────────────────────────────────────────────────────────────────
  # Runs before any deploy so schema is always ahead of code.
  # If this fails, deploy-web and deploy-worker are both skipped.
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 2. Deploy web (Next.js standalone) ───────────────────────────────────────
  deploy-web:
    name: Deploy Next.js web server
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          # NEXT_PHASE is set automatically by `next build` to phase-production-build.
          # Explicit here as belt-and-suspenders for the TEMPORAL_ADDRESS localhost guard in env.ts.
          NEXT_PHASE: phase-production-build
          # Baked into client-side bundles at build time — must match the live hostname.
          NEXT_PUBLIC_BASE_URL: ${{ secrets.APP_URL }}

      - name: Assemble deployment package
        run: |
          # standalone/ is a self-contained Node server.
          # Static assets and public/ must be copied in manually —
          # they are NOT included in standalone output automatically.
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone
          startup-command: 'node server.js'

      - name: Wait for cold start
        run: sleep 30

      - name: Health smoke test
        # Retries 5 times with 10s delay — allows up to 80s for cold start.
        # Exits 1 if the app never returns 200, failing the job.
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Record deployment
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failed")
          curl -sf -X POST "${{ secrets.APP_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"${{ github.event.inputs.environment || 'production' }}\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || echo "Deployment record skipped (endpoint not yet live or token not set — non-critical)"

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Web Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ secrets.APP_URL }}" >> $GITHUB_STEP_SUMMARY

  # ── 3. Deploy worker (Temporal) ───────────────────────────────────────────────
  #
  # DEFERRED — safe to skip for first web deploy.
  #
  # Requires a SEPARATE Azure App Service (Linux, Node 20) named in
  # AZURE_WORKER_APP_NAME with its own publish profile in
  # AZURE_WORKER_PUBLISH_PROFILE.
  #
  # Required App Service environment variables for the worker:
  #   DATABASE_URL, TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE, TEMPORAL_TASK_QUEUE
  #
  # continue-on-error: true means a missing AZURE_WORKER_APP_NAME secret will
  # not fail the overall workflow run or block the web deploy.
  # Remove continue-on-error once the worker App Service is provisioned.
  deploy-worker:
    name: Deploy Temporal worker
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ github.event.inputs.environment || 'production' }}
    continue-on-error: true   # ← remove once AZURE_WORKER_APP_NAME is provisioned

    steps:
      - uses: actions/checkout@v4

      - name: Build worker Docker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t fineguard-worker:${{ github.sha }} \
            .

      - name: Deploy worker to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          images: fineguard-worker:${{ github.sha }}
          startup-command: 'node dist/temporal/worker.js'

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Worker Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
