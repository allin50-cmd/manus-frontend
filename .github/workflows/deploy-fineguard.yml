name: Deploy FineGuard Pro → Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Migrate ────────────────────────────────────────────────────────────────
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 2. Deploy web (Next.js standalone) ───────────────────────────────────────
  deploy-web:
    name: Deploy Next.js web server
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_URL: ${{ secrets.APP_URL }}

      - name: Assemble deployment package
        run: |
          # standalone/ is a self-contained Node server.
          # Static assets and public/ must be copied in manually.
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone
          startup-command: 'node server.js'

      - name: Record deployment
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failed")
          curl -sf -X POST "${{ secrets.APP_URL }}/api/deployments/record" \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"${{ github.event.inputs.environment || 'production' }}\",\"status\":\"$STATUS\",\"commit\":\"${{ github.sha }}\",\"workflowRun\":\"${{ github.run_id }}\"}" \
            || echo "Deployment record skipped (non-critical)"

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Web Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ secrets.APP_URL }}" >> $GITHUB_STEP_SUMMARY

  # ── 3. Deploy worker (Temporal) ───────────────────────────────────────────────
  #
  # Requires a SEPARATE Azure App Service (Linux, Node 20) named in
  # AZURE_WORKER_APP_NAME with its own publish profile in
  # AZURE_WORKER_PUBLISH_PROFILE.
  #
  # Required env vars on the worker App Service:
  #   DATABASE_URL, TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE, TEMPORAL_TASK_QUEUE
  #
  # The worker does NOT serve HTTP — set WEBSITES_PORT=8080 and add a minimal
  # health probe (App Service requires a listening port; the worker logs to stdout).
  # Alternatively, host on Azure Container Apps for true multi-process support.
  deploy-worker:
    name: Deploy Temporal worker
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build worker Docker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t fineguard-worker:${{ github.sha }} \
            .

      - name: Save worker image as tar
        run: docker save fineguard-worker:${{ github.sha }} -o worker.tar

      - name: Deploy worker to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          images: fineguard-worker:${{ github.sha }}
          startup-command: 'node dist/temporal/worker.js'

      - name: Job summary
        if: always()
        run: |
          echo "## FineGuard Pro — Worker Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
