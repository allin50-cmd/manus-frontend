###############################################################################
# FineGuard MTD — Deploy Pipeline
# deploy:staging — automatic on main branch push
# deploy:prod    — manual approval gate required
###############################################################################
name: FineGuard Deploy

on:
  workflow_run:
    workflows: ["FineGuard CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, prod]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Deploy to Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci && npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy to Azure App Service (Staging)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.STAGING_APP_SERVICE_NAME }}
          package: .

      - name: Run database migrations (Staging)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp ssh -n ${{ secrets.STAGING_APP_SERVICE_NAME }} \
              -g ${{ secrets.STAGING_RESOURCE_GROUP }} \
              --command "cd /home/site/wwwroot && npm run db:migrate"

      - name: Record deployment
        run: |
          curl -s -X POST ${{ steps.deploy.outputs.webapp-url }}/api/deployments/record \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"staging","status":"success","commit":"${{ github.sha }}","workflowRun":"${{ github.run_id }}"}'

  # ─── Deploy to Production ────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci && npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy to Azure App Service (Production)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.PROD_APP_SERVICE_NAME }}
          package: .

      - name: Run database migrations (Production)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp ssh -n ${{ secrets.PROD_APP_SERVICE_NAME }} \
              -g ${{ secrets.PROD_RESOURCE_GROUP }} \
              --command "cd /home/site/wwwroot && npm run db:migrate"

      - name: Record deployment
        run: |
          curl -s -X POST ${{ steps.deploy.outputs.webapp-url }}/api/deployments/record \
            -H "X-DEPLOY-TOKEN: ${{ secrets.DEPLOY_RECORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"prod","status":"success","commit":"${{ github.sha }}","workflowRun":"${{ github.run_id }}"}'
