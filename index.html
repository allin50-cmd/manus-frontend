<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Garage Acquisition Radar</title>
<style>
:root {
  --bg:#08090e;--bg2:#0e1018;--bg3:#141622;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --cyan:#00d4ff;--purple:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --hot:#ef4444;--warm:#f59e0b;--cold:#3b82f6;
  --nav-w:220px;--r:8px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;display:flex}
#nav{width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.nav-logo{padding:20px 18px 12px;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan);border-bottom:1px solid var(--border);margin-bottom:8px}
.nav-logo span{display:block;font-size:9px;color:var(--txt3);letter-spacing:.08em;margin-top:2px;font-weight:400}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:var(--txt2);cursor:pointer;transition:all .15s;user-select:none;position:relative}
.nav-item:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--cyan);background:rgba(0,212,255,.06)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cyan)}
.nav-item .ico{font-size:14px;width:18px;text-align:center}
.nav-sec{padding:16px 18px 4px;font-size:9px;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}
#main{margin-left:var(--nav-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50}
.tb-title{font-size:14px;font-weight:600}
.tb-sub{font-size:11px;color:var(--txt3);margin-top:1px}
#content{padding:24px;max-width:1400px;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--txt3)}
.stat.cyan .stat-val{color:var(--cyan)}.stat.green .stat-val{color:var(--green)}.stat.amber .stat-val{color:var(--amber)}.stat.red .stat-val{color:var(--red)}.stat.purple .stat-val{color:#a78bfa}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.btn-primary{background:var(--cyan);color:#000}.btn-primary:hover{background:#00bbdd}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--border2)}.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.btn-purple{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}.btn-purple:hover{background:rgba(124,58,237,.3)}
.btn-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}.btn-green:hover{background:rgba(16,185,129,.25)}
.btn-sm{padding:4px 10px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.b-hot{background:rgba(239,68,68,.15);color:var(--hot);border:1px solid rgba(239,68,68,.3)}
.b-warm{background:rgba(245,158,11,.15);color:var(--warm);border:1px solid rgba(245,158,11,.3)}
.b-cold{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.b-pass{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.b-fail{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.b-warn{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.b-cyan{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.b-purple{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.b-neutral{background:rgba(255,255,255,.06);color:var(--txt3);border:1px solid var(--border2)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase}
.fi,.fs,.fta{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:13px;font-family:var(--font);width:100%;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--cyan)}
.fta{min-height:80px;resize:vertical}
.fsec{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;grid-column:1/-1}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--txt2);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
td.nc{color:var(--txt);font-weight:500}
.tbl-acts{display:flex;gap:4px}
.gate-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;margin-bottom:4px;background:var(--bg3);border:1px solid var(--border)}
.gate-item.pass{border-color:rgba(16,185,129,.25)}.gate-item.fail{border-color:rgba(239,68,68,.25)}
.gate-lbl{font-size:12px;color:var(--txt2);flex:1}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--txt2)}.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px}
.filter-bar input,.filter-bar select{background:var(--bg2);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;color:var(--txt);font-size:12px;font-family:var(--font);outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--cyan)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
#modal-overlay.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:880px;padding:24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--txt);z-index:300;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
#toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}
.letter-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:20px;font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:Georgia,serif;color:var(--txt2)}
.dev-note{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:6px;padding:14px;font-size:13px;color:#c4b5fd;line-height:1.7;white-space:pre-wrap;font-family:Georgia,serif}
.log-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.log-time{font-size:10px;color:var(--txt3);white-space:nowrap;font-family:monospace;padding-top:2px;flex-shrink:0}
.log-detail{font-size:12px;color:var(--txt2)}
.log-site{font-size:11px;color:var(--txt3)}
.warn-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);font-size:11px;color:var(--amber);margin-bottom:4px}
.lesson-row{padding:12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:8px}
.gate-block{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red)}
.tc{font-family:monospace;font-size:11px;color:var(--txt3)}
.tr{text-align:right}
.sep{border:none;border-top:1px solid var(--border);margin:20px 0}
.empty{padding:40px;text-align:center;color:var(--txt3);font-size:13px}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.ic{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}
.txt-xs{font-size:11px;color:var(--txt3)}.txt-sm{font-size:12px}.fw7{font-weight:700}
.ssel{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 6px;color:var(--txt2);font-size:11px;cursor:pointer;outline:none;font-family:var(--font)}
.ssel:focus{border-color:var(--cyan)}
.tcode{width:100%;min-height:140px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px;color:var(--txt);font-family:monospace;font-size:11px;resize:vertical;outline:none}
.tcode:focus{border-color:var(--cyan)}
@media(max-width:768px){
  #nav{transform:translateX(-100%);transition:transform .25s}
  #nav.open{transform:translateX(0)}
  #main{margin-left:0}
  #topbar{padding:12px 16px}
  #content{padding:14px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  #mob-btn{display:flex!important}
}
#mob-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);cursor:pointer;font-size:16px;flex-shrink:0}
#sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#sb-ov.open{display:block}
</style>
</head>
<body>
<div id="sb-ov" onclick="closeSb()"></div>
<nav id="nav">
  <div class="nav-logo">GAR<span>Garage Acquisition Radar</span></div>
  <div class="nav-sec">Overview</div>
  <div class="nav-item active" data-view="dashboard" onclick="go('dashboard')"><span class="ico">◈</span>Dashboard</div>
  <div class="nav-item" data-view="harness" onclick="go('harness')"><span class="ico">⚙</span>Harness Console</div>
  <div class="nav-sec">Sites</div>
  <div class="nav-item" data-view="sites" onclick="go('sites')"><span class="ico">⬡</span>Site Tables</div>
  <div class="nav-item" data-view="add" onclick="startAdd()"><span class="ico">+</span>Add Site</div>
  <div class="nav-item" data-view="gate" onclick="go('gate')"><span class="ico">⬢</span>Harness Gates</div>
  <div class="nav-item" data-view="letter" onclick="go('letter')"><span class="ico">✉</span>Outreach Letters</div>
  <div class="nav-sec">Data</div>
  <div class="nav-item" data-view="log" onclick="go('log')"><span class="ico">◎</span>Activity Log</div>
  <div class="nav-item" data-view="lessons" onclick="go('lessons')"><span class="ico">◐</span>Harness Lessons</div>
  <div class="nav-item" data-view="io" onclick="go('io')"><span class="ico">⇅</span>Import / Export</div>
</nav>
<div id="main">
  <div id="topbar">
    <div id="mob-btn" onclick="toggleSb()">☰</div>
    <div>
      <div class="tb-title" id="tb-title">Dashboard</div>
      <div class="tb-sub" id="tb-sub">Garage Acquisition Radar</div>
    </div>
    <div class="flex gap8">
      <button class="btn btn-ghost btn-sm" onclick="loadSeed()">Load Seed</button>
      <button class="btn btn-primary btn-sm" onclick="startAdd()">+ Add Site</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="modal-overlay" onclick="moClick(event)">
  <div id="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">Add Site</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toast"></div>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const PIPELINES=['DISCOVERED','DUDRICH_CHECK','LAND_REGISTRY_CHECK','CONTRACT_REVIEW','VALUED','OFFER_READY','OFFER_SENT','FOLLOW_UP','NEGOTIATION','WON','LOST','DEVELOPMENT_READY','LEGAL_REVIEW'];
const REC_ACTS=['NO_ACTION','DUDRICH_EXCLUDED','DEVELOP_UNDER_EXISTING_CONTRACT','LEGAL_REVIEW_REQUIRED','ACQUISITION_TARGET','SEND_OFFER','FOLLOW_UP','NEGOTIATE','WON','LOST'];
const OWNER_TYPES=['Individual','Company','Council','Housing Association','Charity','Unknown'];
const OWN_STATS=['Unknown','Land Registry Needed','Confirmed'];
const DUD_STATS=['Unknown','Confirmed Dudrich','Not Dudrich'];
const CONTRACT_VALS=['Unknown','Yes','No','Needs Review'];
const DEV_RIGHTS=['Unknown','Full','Partial'];
const FUTURE_RIGHTS=['Unknown','Yes','No'];
const PLANNING=['Unknown','High','Medium','Low'];
const CONDITIONS=['Average','Good','Poor','Derelict'];
const VACANCIES=['Unknown','Low','Medium','High'];
const COUNTIES=['Greater London','Surrey','Kent','East Sussex','West Sussex','Essex','Hampshire','Berkshire','Hertfordshire','Other'];
const LESSON_FAILS=['Wrong Owner','Wrong Dudrich Match','Wrong Valuation','Duplicate Site','Contract Coverage Error','Bad Offer Sent','Missing Follow Up','Other'];
const LESSON_STATS=['Open','Rule Added','Implemented','Closed'];
const CSV_HDR=['Site_ID','Site_Name','Address','Town','County','Postcode','Region','Estimated_Units','Market_Value','Monthly_Rent_Per_Unit','Annual_Rent','Gross_Yield','Offer_5','Offer_10','Owner_Name','Owner_Type','Ownership_Status','Dudrich_Status','Covered_By_Development_Contract','Contract_Reference','Development_Rights','Future_Site_Rights','Planning_Potential','Excluded','Condition','Vacancy_Level','Score','Priority','Pipeline_Status','Recommended_Action','Last_Contacted','Next_Action','Next_Action_Date','Notes','Harness_Classification','Harness_Route','Ownership_Risk','Contract_Confidence','Valuation_Confidence','Planning_Upside','Rubric_Score','Rubric_Decision','Loop_Next_Step','Loop_Blocking_Reason','Input_Quality_Score','Input_Quality_Tier'];

// ── STATE ──────────────────────────────────────────────────────────────────
let sites=[],logs=[],lessons=[];
let curView='dashboard',editId=null,gateSelId=null,letterSelId=null,siteTab='all';
let F={search:'',county:'',priority:'',pipeline:'',recAction:'',dudrich:'',contract:'',minScore:''};

// ── STORAGE ────────────────────────────────────────────────────────────────
function loadData(){
  try{sites=JSON.parse(localStorage.getItem('gar_sites')||'[]')}catch{sites=[]}
  try{logs=JSON.parse(localStorage.getItem('gar_logs')||'[]')}catch{logs=[]}
  try{lessons=JSON.parse(localStorage.getItem('gar_lessons')||'[]')}catch{lessons=[]}
}
function saveData(){
  localStorage.setItem('gar_sites',JSON.stringify(sites));
  localStorage.setItem('gar_logs',JSON.stringify(logs));
  localStorage.setItem('gar_lessons',JSON.stringify(lessons));
}

// ── ID GENERATORS ──────────────────────────────────────────────────────────
function nextSiteId(){
  let max=0;
  sites.forEach(s=>{const m=s.id&&s.id.match(/GAR-(\d+)/);if(m)max=Math.max(max,+m[1])});
  return 'GAR-'+String(max+1).padStart(4,'0');
}
function nextLessonId(){
  let max=0;
  lessons.forEach(l=>{const m=l.id&&l.id.match(/LES-(\d+)/);if(m)max=Math.max(max,+m[1])});
  return 'LES-'+String(max+1).padStart(4,'0');
}

// ── ACTIVITY LOG ───────────────────────────────────────────────────────────
function logAct(siteId,action,oldVal,newVal,notes){
  logs.unshift({ts:new Date().toISOString(),siteId,action,oldVal:oldVal??'',newVal:newVal??'',notes:notes||''});
  if(logs.length>500)logs=logs.slice(0,500);
}

// ── SCORING ────────────────────────────────────────────────────────────────
function calcScore(s){
  if(s.excluded===true)return 0;
  let p=0;
  const u=parseInt(s.units)||0;
  if(u>=31)p+=20;else if(u>=16)p+=15;else if(u>=6)p+=10;else if(u>=1)p+=5;
  if(s.dudrichStatus==='Not Dudrich')p+=15;
  else if(s.dudrichStatus==='Confirmed Dudrich'&&s.coveredByContract==='Yes')p+=20;
  if(s.ownershipStatus==='Confirmed')p+=15;
  if(s.ownerType==='Individual'||s.ownerType==='Company')p+=10;
  if(s.vacancyLevel==='High')p+=10;else if(s.vacancyLevel==='Medium')p+=5;
  if(s.condition==='Poor'||s.condition==='Derelict')p+=10;
  if(s.planningPotential==='High')p+=15;else if(s.planningPotential==='Medium')p+=8;
  if(s.developmentRights==='Full')p+=15;else if(s.developmentRights==='Partial')p+=8;
  return Math.min(100,p);
}
function calcPrio(sc,excl){
  if(excl)return'COLD';
  if(sc>=75)return'HOT';if(sc>=50)return'WARM';return'COLD';
}

// ── GATE RULES (source of truth) ──────────────────────────────────────────
function applyGates(s){
  let excl=false,ra='NO_ACTION';
  if(s.dudrichStatus==='Confirmed Dudrich'){
    if(s.coveredByContract==='Yes'){ra='DEVELOP_UNDER_EXISTING_CONTRACT';excl=false}
    else if(s.coveredByContract==='Needs Review'){ra='LEGAL_REVIEW_REQUIRED';excl=false}
    else if(s.coveredByContract==='No'){ra='DUDRICH_EXCLUDED';excl=true}
    else{ra='NO_ACTION';excl=false}
  }else if(s.dudrichStatus==='Not Dudrich'){
    excl=false;
    ra=(s.ownershipStatus==='Confirmed'&&parseFloat(s.marketValue)>0)?'ACQUISITION_TARGET':'NO_ACTION';
  }else{ra='NO_ACTION';excl=false}
  return{excluded:excl,recommendedAction:ra};
}

// ── OFFER CALCULATOR ───────────────────────────────────────────────────────
function calcOffers(s){
  const u=parseInt(s.units)||0,r=parseFloat(s.monthlyRentPerUnit)||0,mv=parseFloat(s.marketValue)||0;
  const ar=u*r*12;
  return{annualRent:ar,offer5:mv?mv*1.05:0,offer10:mv?mv*1.10:0,grossYield:(mv&&ar)?ar/mv:0};
}

// ── COMPUTE ALL DERIVED FIELDS ─────────────────────────────────────────────
function derive(s){
  const g=applyGates(s);
  s.excluded=g.excluded;s.recommendedAction=g.recommendedAction;
  const o=calcOffers(s);
  s.annualRent=o.annualRent;s.offer5=o.offer5;s.offer10=o.offer10;s.grossYield=o.grossYield;
  s.score=calcScore(s);s.priority=calcPrio(s.score,s.excluded);
  // Harness fields
  const hc=harnessClassify(s);s.harnessClass=hc.cls;s.harnessRoute=hc.route;
  const fa=fanOut(s);s.ownershipRisk=fa.ownerRisk;s.contractConf=fa.contractConf;s.valuationConf=fa.valuationConf;s.planningUpside=fa.planningUpside;
  const rb=rubric(s);s.rubricScore=rb.score;s.rubricDecision=rb.decision;
  const lp=loopStep(s);s.loopNextStep=lp.next;s.loopBlockingReason=lp.reason;
  const iq=calcInputQuality(s);s.inputQuality=iq.score;s.inputTier=iq.tier;
  return s;
}

// ── LAYER 1: INPUT QUALITY ─────────────────────────────────────────────────
function calcInputQuality(s){
  let p=0;
  // Identity (25 pts)
  if(s.name&&s.name.trim())p+=5;
  if(s.address&&s.address.trim())p+=5;
  if(s.town&&s.town.trim())p+=5;
  if(s.county&&s.county.trim())p+=5;
  if(s.postcode&&s.postcode.trim())p+=5;
  // Financial (20 pts)
  if(parseInt(s.units)>0)p+=10;
  if(parseFloat(s.marketValue)>0)p+=10;
  // Ownership (25 pts)
  if(s.ownerName&&s.ownerName.trim())p+=10;
  if(s.ownershipStatus==='Confirmed')p+=10;
  else if(s.ownershipStatus==='Land Registry Needed')p+=5;
  if(s.ownerType&&s.ownerType!=='Unknown')p+=5;
  // Dudrich / contract (15 pts)
  if(s.dudrichStatus&&s.dudrichStatus!=='Unknown')p+=10;
  if(s.coveredByContract&&s.coveredByContract!=='Unknown')p+=5;
  // Site characteristics (10 pts)
  if(s.planningPotential&&s.planningPotential!=='Unknown')p+=5;
  if(s.condition&&s.condition)p+=3;
  if(s.vacancyLevel&&s.vacancyLevel!=='Unknown')p+=2;
  // Pipeline discipline (5 pts)
  if(s.nextAction&&s.nextAction.trim())p+=5;
  const score=Math.min(100,p);
  const tier=score>=80?'CLEAN':score>=60?'PARTIAL':'INCOMPLETE';
  return{score,tier};
}

// ── HARNESS CLASSIFICATION ─────────────────────────────────────────────────
const HCLASS_ACTIONS={
  DUDRICH_CONTRACTED_DEVELOPMENT:'Review development rights and planning potential',
  DUDRICH_EXCLUDED:'Exclude from acquisition pipeline',
  LEGAL_REVIEW_REQUIRED:'Send to legal review before action',
  NON_DUDRICH_ACQUISITION:'Prepare valuation and offer pack',
  UNKNOWN_NEEDS_INVESTIGATION:'Complete Dudrich and Land Registry checks',
  INCOMPLETE_RECORD:'Complete missing required fields',
};
function harnessClassify(s){
  const d=s.dudrichStatus,c=s.coveredByContract,o=s.ownershipStatus,mv=parseFloat(s.marketValue)||0;
  let cls,route;
  if(d==='Confirmed Dudrich'&&c==='Yes'){cls='DUDRICH_CONTRACTED_DEVELOPMENT';route='DEVELOPMENT'}
  else if(d==='Confirmed Dudrich'&&c==='No'){cls='DUDRICH_EXCLUDED';route='EXCLUDE'}
  else if(d==='Confirmed Dudrich'&&c==='Needs Review'){cls='LEGAL_REVIEW_REQUIRED';route='LEGAL_REVIEW'}
  else if(d==='Not Dudrich'&&o==='Confirmed'&&mv>0){cls='NON_DUDRICH_ACQUISITION';route='ACQUISITION'}
  else if(d==='Unknown'||o==='Unknown'){cls='UNKNOWN_NEEDS_INVESTIGATION';route='INVESTIGATE'}
  else{cls='INCOMPLETE_RECORD';route='INVESTIGATE'}
  return{cls,route};
}

// ── FAN-OUT ANALYSIS ───────────────────────────────────────────────────────
function riskLevel(val,low,med){return val<=low?'LOW':val<=med?'MEDIUM':'HIGH'}
function fanOut(s){
  // Ownership Risk
  let ownerRisk,ownerNote;
  if(s.ownershipStatus==='Confirmed'&&s.ownerName&&s.ownerName.trim()){ownerRisk='LOW';ownerNote='Ownership confirmed with named owner.'}
  else if(s.ownershipStatus==='Unknown'){ownerRisk='HIGH';ownerNote='Ownership status unknown — Land Registry search required.'}
  else{ownerRisk='MEDIUM';ownerNote='Partially known — ownership confirmation needed.'}
  // Contract Confidence
  let contractConf,contractNote;
  if(s.coveredByContract==='Yes'&&s.contractRef&&s.contractRef.trim()){contractConf='HIGH';contractNote='Contract confirmed with reference number.'}
  else if(s.coveredByContract==='Unknown'||s.coveredByContract==='Needs Review'){contractConf='LOW';contractNote='Contract status unclear — legal review required.'}
  else if(s.coveredByContract==='No'){contractConf='HIGH';contractNote='No contract — site is free to pursue as acquisition target.'}
  else{contractConf='MEDIUM';contractNote='Contract data partially available.'}
  // Valuation Confidence
  let valuationConf,valuationNote;
  const mv=parseFloat(s.marketValue)||0,u=parseInt(s.units)||0,r=parseFloat(s.monthlyRentPerUnit)||0;
  if(mv>0&&u>0&&r>0){valuationConf='HIGH';valuationNote=`Market value ${gbp(mv)}, ${u} units @ ${gbp(r)}/mo. Yield: ${pct(s.grossYield)}.`}
  else if(mv>0&&u>0){valuationConf='MEDIUM';valuationNote=`Market value and units known but rent missing. Offer range: ${gbp(s.offer5)}–${gbp(s.offer10)}.`}
  else{valuationConf='LOW';valuationNote='Valuation data missing — site cannot be offered.'}
  // Planning Upside
  let planningUpside,planningNote;
  if(s.planningPotential==='High'){planningUpside='HIGH';planningNote='High planning potential — strong development / redevelopment upside.'}
  else if(s.planningPotential==='Medium'){planningUpside='MEDIUM';planningNote='Medium planning potential — some upside with planning effort.'}
  else if(s.planningPotential==='Low'){planningUpside='LOW';planningNote='Low planning potential — limited development value.'}
  else{planningUpside='LOW';planningNote='Planning potential not assessed.'}
  return{ownerRisk,ownerNote,contractConf,contractNote,valuationConf,valuationNote,planningUpside,planningNote};
}

// ── RUBRIC ────────────────────────────────────────────────────────────────
function rubric(s){
  const mv=parseFloat(s.marketValue)||0,u=parseInt(s.units)||0;
  const devReady=s.pipelineStatus==='DEVELOPMENT_READY';
  const offerSent=s.pipelineStatus==='OFFER_SENT';
  const devSafe=!(devReady&&!(s.dudrichStatus==='Confirmed Dudrich'&&s.coveredByContract==='Yes'&&(s.developmentRights==='Full'||s.developmentRights==='Partial')&&s.contractRef&&s.contractRef.trim()));
  const offerSafe=!(offerSent&&!(s.dudrichStatus==='Not Dudrich'&&s.ownershipStatus==='Confirmed'&&mv>0&&s.ownerName&&s.ownerName.trim()));
  const items=[
    {label:'Ownership Evidence',pass:s.ownershipStatus==='Confirmed'&&!!(s.ownerName&&s.ownerName.trim())},
    {label:'Dudrich Check',pass:s.dudrichStatus!=='Unknown'},
    {label:'Contract Check',pass:s.coveredByContract!=='Needs Review'},
    {label:'Valuation',pass:mv>0&&u>0},
    {label:'Action Safety',pass:!!(s.recommendedAction&&s.recommendedAction!=='NO_ACTION')},
    {label:'Follow-Up Discipline',pass:!!(s.nextAction&&s.nextAction.trim())},
    {label:'Development Safety',pass:devSafe},
    {label:'Offer Safety',pass:offerSafe},
  ];
  const score=items.filter(x=>x.pass).length;
  let decision;
  if(!offerSafe||!devSafe)decision='BLOCKED';
  else if(score===8)decision='APPROVED';
  else if(score>=5)decision='NEEDS_FIX';
  else decision='BLOCKED';
  return{items,score,decision};
}

// ── LOOP UNTIL DONE ────────────────────────────────────────────────────────
const LOOP_DONE_STATUSES=['WON','LOST','DEVELOPMENT_READY','DUDRICH_EXCLUDED'];
function loopStep(s){
  if(LOOP_DONE_STATUSES.includes(s.pipelineStatus)||s.recommendedAction==='DUDRICH_EXCLUDED'){
    return{done:true,next:'Workflow complete',reason:'',suggestedStatus:s.pipelineStatus};
  }
  const mv=parseFloat(s.marketValue)||0;
  if(s.dudrichStatus==='Unknown')return{done:false,next:'Complete Dudrich check',reason:'Dudrich status unknown',suggestedStatus:'DUDRICH_CHECK'};
  if(s.ownershipStatus!=='Confirmed')return{done:false,next:'Complete Land Registry ownership check',reason:'Ownership not confirmed',suggestedStatus:'LAND_REGISTRY_CHECK'};
  if(s.dudrichStatus==='Confirmed Dudrich'&&s.coveredByContract==='Needs Review')return{done:false,next:'Legal review of contract coverage',reason:'Contract coverage needs review',suggestedStatus:'LEGAL_REVIEW'};
  if(s.dudrichStatus==='Confirmed Dudrich'&&s.coveredByContract==='Yes'&&s.developmentRights==='Unknown')return{done:false,next:'Confirm development rights',reason:'Development rights unknown',suggestedStatus:'CONTRACT_REVIEW'};
  if(!mv)return{done:false,next:'Complete valuation',reason:'Market value missing',suggestedStatus:'VALUED'};
  if(!s.nextAction||!s.nextAction.trim())return{done:false,next:'Set next action',reason:'No next action defined',suggestedStatus:s.pipelineStatus};
  if(s.pipelineStatus==='OFFER_SENT'&&!s.nextActionDate)return{done:false,next:'Set follow-up date for offer',reason:'Offer sent but no follow-up date',suggestedStatus:'FOLLOW_UP'};
  return{done:false,next:'Continue current pipeline action: '+s.pipelineStatus,reason:'',suggestedStatus:s.pipelineStatus};
}

// ── GENERATE AND FILTER ────────────────────────────────────────────────────
function generateActions(s){
  const all=[
    {action:'Complete Land Registry ownership check',check:()=>true},
    {action:'Check against Dudrich/LockUpGarages portfolio',check:()=>true},
    {action:'Review development contract coverage',check:()=>true},
    {action:'Confirm planning potential',check:()=>true},
    {action:'Create offer pack',check:()=>parseFloat(s.marketValue)>0,blockReason:'Valuation required before offer pack'},
    {action:'Send owner letter',check:()=>canStatus(s,'OFFER_SENT'),blockReason:'Offer Safety check must pass (Not Dudrich, Confirmed owner, MV > 0, owner name)'},
    {action:'Schedule follow-up',check:()=>true},
    {action:'Exclude from acquisition',check:()=>s.coveredByContract!=='Yes',blockReason:'Cannot exclude — site is covered by development contract'},
    {action:'Escalate to legal review',check:()=>true},
    {action:'Prepare development feasibility review',check:()=>s.coveredByContract==='Yes',blockReason:'Development feasibility requires confirmed contract coverage'},
    {action:'Negotiate',check:()=>s.pipelineStatus==='OFFER_SENT',blockReason:'Cannot negotiate before offer is sent'},
  ];
  const approved=[],blocked=[];
  all.forEach(a=>{if(a.check())approved.push(a.action);else blocked.push({action:a.action,reason:a.blockReason})});
  return{approved,blocked};
}

// ── TOURNAMENT ────────────────────────────────────────────────────────────
const RISK_ORDER={LOW:0,MEDIUM:1,HIGH:2,undefined:3};
const PLAN_ORDER={High:3,Medium:2,Low:1,Unknown:0};
function tournamentCompare(a,b){
  if(a.score!==b.score)return b.score-a.score;
  if((a.grossYield||0)!==(b.grossYield||0))return (b.grossYield||0)-(a.grossYield||0);
  if((parseInt(a.units)||0)!==(parseInt(b.units)||0))return (parseInt(b.units)||0)-(parseInt(a.units)||0);
  const ra=RISK_ORDER[a.ownershipRisk],rb=RISK_ORDER[b.ownershipRisk];
  if(ra!==rb)return ra-rb;
  return (PLAN_ORDER[b.planningPotential]||0)-(PLAN_ORDER[a.planningPotential]||0);
}

// ── STATUS GATE ENFORCEMENT ────────────────────────────────────────────────
function canStatus(s,st){
  if(st==='OFFER_SENT')return s.dudrichStatus==='Not Dudrich'&&s.ownershipStatus==='Confirmed'&&parseFloat(s.marketValue)>0&&!!(s.ownerName&&s.ownerName.trim());
  if(st==='DEVELOPMENT_READY')return s.dudrichStatus==='Confirmed Dudrich'&&s.coveredByContract==='Yes'&&(s.developmentRights==='Full'||s.developmentRights==='Partial')&&!!(s.contractRef&&s.contractRef.trim());
  return true;
}

function gateChecks(s){return[
  {label:'Dudrich status checked',pass:s.dudrichStatus!=='Unknown'},
  {label:'Ownership confirmed',pass:s.ownershipStatus==='Confirmed'},
  {label:'Contract coverage checked',pass:s.coveredByContract!=='Unknown'},
  {label:'Valuation complete',pass:parseFloat(s.marketValue)>0},
  {label:'Owner name present',pass:!!(s.ownerName&&s.ownerName.trim())},
  {label:'Planning potential assessed',pass:s.planningPotential!=='Unknown'},
  {label:'Next action set',pass:!!(s.nextAction&&s.nextAction.trim())},
];}

function siteWarnings(s){
  const w=[];
  if(!parseFloat(s.marketValue))w.push('Market value missing');
  if(!parseInt(s.units))w.push('Estimated units missing');
  if(s.dudrichStatus==='Unknown')w.push('Dudrich status unknown');
  if(s.ownershipStatus!=='Confirmed')w.push('Ownership not confirmed');
  if(!s.ownerName||!s.ownerName.trim())w.push('Owner name missing');
  if(s.coveredByContract==='Needs Review')w.push('Contract coverage needs review');
  if(s.nextActionDate&&new Date(s.nextActionDate)<new Date()&&s.nextAction)w.push('Next action overdue');
  if(s.developmentRights==='Unknown')w.push('Development rights unknown');
  return w;
}

function pct(v){return((parseFloat(v)||0)*100).toFixed(2)+'%'}
function tsd(iso){if(!iso)return'';return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function escH(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function cancelEdit(){editId=null;go('sites')}
function editSite(id){editId=id;go('add')}
function fv(id){return(document.getElementById(id)||{}).value||''}
function getFormVals(){return{name:fv('f_name'),address:fv('f_address'),town:fv('f_town'),county:fv('f_county'),postcode:fv('f_postcode'),region:fv('f_region'),units:fv('f_units'),marketValue:fv('f_marketValue'),monthlyRentPerUnit:fv('f_monthlyRentPerUnit'),ownerName:fv('f_ownerName'),ownerType:fv('f_ownerType'),ownershipStatus:fv('f_ownershipStatus'),dudrichStatus:fv('f_dudrichStatus'),coveredByContract:fv('f_coveredByContract'),contractRef:fv('f_contractRef'),developmentRights:fv('f_developmentRights'),futureRights:fv('f_futureRights'),planningPotential:fv('f_planningPotential'),condition:fv('f_condition'),vacancyLevel:fv('f_vacancyLevel'),pipelineStatus:fv('f_pipelineStatus'),nextAction:fv('f_nextAction'),nextActionDate:fv('f_nextActionDate'),lastContacted:fv('f_lastContacted'),notes:fv('f_notes')}}

function saveSite(){
  const vals=getFormVals();
  if(!vals.name.trim()){toast('Site Name is required','err');return}
  if(editId){
    const idx=sites.findIndex(x=>x.id===editId);if(idx<0)return;
    const old={...sites[idx]};
    const upd={...sites[idx],...vals,updatedAt:new Date().toISOString()};
    derive(upd);
    const watched={pipelineStatus:'STATUS_CHANGED',dudrichStatus:'DUDRICH_CHANGED',coveredByContract:'CONTRACT_CHANGED',marketValue:'VALUE_CHANGED',ownerName:'OWNER_CHANGED'};
    Object.entries(watched).forEach(([f,a])=>{if(old[f]!==upd[f])logAct(upd.id,a,old[f],upd[f])});
    logAct(upd.id,'SITE_UPDATED','','','Updated by user');
    sites[idx]=upd;editId=null;saveData();toast('Site updated','ok');go('sites');
  }else{
    const id=nextSiteId();
    const ns={id,...vals,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    derive(ns);sites.push(ns);logAct(id,'SITE_CREATED','','','Site created');
    saveData();toast('Site added: '+id,'ok');go('sites');
  }
}

function delSite(id){
  const s=sites.find(x=>x.id===id);if(!s)return;
  if(!confirm(`Delete "${s.name}" (${s.id})? This cannot be undone.`))return;
  sites=sites.filter(x=>x.id!==id);
  logAct(id,'SITE_DELETED',s.name,'','Deleted by user');
  saveData();toast('Site deleted','ok');render();
}

function buildLetter(s){
  if(s.recommendedAction==='DEVELOP_UNDER_EXISTING_CONTRACT'){
    const note=`DEVELOPMENT REVIEW NOTE\n${'─'.repeat(30)}\nSite: ${s.name}\nSite ID: ${s.id}\nAddress: ${[s.address,s.town,s.county,s.postcode].filter(Boolean).join(', ')}\nContract Reference: ${s.contractRef||'[CONTRACT REF]'}\nDevelopment Rights: ${s.developmentRights}\nPlanning Potential: ${s.planningPotential}\n\nSTATUS: Covered under existing development contract.\nThis is a Confirmed Dudrich site with active contract coverage (Ref: ${s.contractRef||'[CONTRACT REF]'}).\n\nAction: Proceed under the terms of the existing development agreement.\nLegal team to confirm scope of works. No acquisition letter required.\n\nReviewed: ${new Date().toLocaleDateString('en-GB')}\nReviewed by: [Name]`;
    return`<div class="card-title">Development Review Note</div><div class="dev-note" id="lc">${escH(note)}</div><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="copyLetter()">Copy Note</button>`;
  }
  const now=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const letter=`[Buyer Name]\n[Company Name]\n[Address]\n\n${now}\n\nDear ${s.ownerName||'Sir / Madam'},\n\nRe: Lock-Up Garage Site — ${s.address?s.address+', ':''}${s.town||''}\n\nI am writing to you as a property investor with a specific interest in acquiring lock-up garage portfolios across South East England. I understand that you may be the owner of the above-referenced site, which comprises approximately ${s.units||'[NUMBER]'} garage units.\n\nWe are actively seeking to acquire garage sites in your area and are in a position to offer a straightforward, professional transaction with rapid completion. Our offer would be in the region of ${gbp(s.offer5)} to ${gbp(s.offer10)} — 5–10% above current market value — subject to title checks and a short survey period. We are experienced buyers who can move quickly and with minimal disruption to any existing tenants.\n\nIf you have any interest in discussing this further, or if you simply wish to understand what your site could be worth, I would be delighted to have an initial conversation at your convenience. There is absolutely no obligation.\n\nPlease contact me:\nPhone: [Phone Number]\nEmail: [Email Address]\n\nYours sincerely,\n\n[Buyer Name]\n[Company / Trading Name]\n[Phone Number]\n[Email Address]`;
  return`<div class="card-title">Acquisition Letter — ${escH(s.id)}</div><div class="letter-box" id="lc">${escH(letter)}</div><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="copyLetter()">Copy Letter</button>`;
}
function copyLetter(){
  const el=document.getElementById('lc');if(!el)return;

// CSV
function csvEsc(v){const s=String(v??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`${s}`}
function siteToCSV(s){return[s.id,s.name,s.address,s.town,s.county,s.postcode,s.region,s.units,s.marketValue,s.monthlyRentPerUnit,(s.annualRent||0).toFixed(2),(s.grossYield||0).toFixed(6),(s.offer5||0).toFixed(2),(s.offer10||0).toFixed(2),s.ownerName,s.ownerType,s.ownershipStatus,s.dudrichStatus,s.coveredByContract,s.contractRef,s.developmentRights,s.futureRights,s.planningPotential,s.excluded?'Yes':'No',s.condition,s.vacancyLevel,s.score||0,s.priority,s.pipelineStatus,s.recommendedAction,s.lastContacted,s.nextAction,s.nextActionDate,s.notes,s.harnessClass||'',s.harnessRoute||'',s.ownershipRisk||'',s.contractConf||'',s.valuationConf||'',s.planningUpside||'',s.rubricScore??'',s.rubricDecision||'',s.loopNextStep||'',s.loopBlockingReason||'',s.inputQuality??'',s.inputTier||''].map(csvEsc).join(',')}
function expCSV(){dl('gar-sites.csv',[CSV_HDR.join(','),...sites.map(siteToCSV)].join('\n'))}

function parseCSVLine(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ){inQ=true;continue}
    if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++}else inQ=false;continue}
    if(ch===','&&!inQ){r.push(cur);cur='';continue}
    cur+=ch;
  }
  r.push(cur);return r;
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];
  const hdrs=parseCSVLine(lines[0]).map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{const v=parseCSVLine(l);const o={};hdrs.forEach((h,i)=>{o[h]=v[i]??''});return o;});
}
function csvRowToSite(r){return{id:r['Site_ID']||'',name:r['Site_Name']||'',address:r['Address']||'',town:r['Town']||'',county:r['County']||'',postcode:r['Postcode']||'',region:r['Region']||'',units:r['Estimated_Units']||'',marketValue:r['Market_Value']||'',monthlyRentPerUnit:r['Monthly_Rent_Per_Unit']||'',ownerName:r['Owner_Name']||'',ownerType:r['Owner_Type']||'',ownershipStatus:r['Ownership_Status']||'',dudrichStatus:r['Dudrich_Status']||'',coveredByContract:r['Covered_By_Development_Contract']||'',contractRef:r['Contract_Reference']||'',developmentRights:r['Development_Rights']||'',futureRights:r['Future_Site_Rights']||'',planningPotential:r['Planning_Potential']||'',condition:r['Condition']||'',vacancyLevel:r['Vacancy_Level']||'',pipelineStatus:r['Pipeline_Status']||'',nextAction:r['Next_Action']||'',nextActionDate:r['Next_Action_Date']||'',lastContacted:r['Last_Contacted']||'',notes:r['Notes']||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function impCSVRows(rows){
  let a=0,u=0;
  rows.forEach(r=>{const s=csvRowToSite(r);derive(s);const ei=sites.findIndex(x=>x.id===s.id&&/^GAR-\d+$/.test(s.id));if(ei>=0){sites[ei]=s;u++}else{if(!/^GAR-\d+$/.test(s.id))s.id=nextSiteId();sites.push(s);a++}});
  saveData();toast(`Imported: ${a} added, ${u} updated`,'ok');render();
}

// LAYER 1 — INPUT GUARD
function hLayer1Panel(){
  if(!sites.length)return'<div class="empty">No sites. Load seed data first.</div>';
  const tierBadge={CLEAN:'b-pass',PARTIAL:'b-warn',INCOMPLETE:'b-fail'};
  const counts={CLEAN:0,PARTIAL:0,INCOMPLETE:0};
  sites.forEach(s=>counts[s.inputTier]=(counts[s.inputTier]||0)+1);
  const avgQ=sites.length?Math.round(sites.reduce((a,s)=>a+(s.inputQuality||0),0)/sites.length):0;
  const rows=sites.map(s=>{
    // Show which specific checks failed
    const missing=[];
    if(!s.name||!s.name.trim())missing.push('Name');
    if(!s.address||!s.address.trim())missing.push('Address');
    if(!s.town||!s.town.trim())missing.push('Town');
    if(!(parseInt(s.units)>0))missing.push('Units');
    if(!(parseFloat(s.marketValue)>0))missing.push('Market Value');
    if(!s.ownerName||!s.ownerName.trim())missing.push('Owner Name');
    if(s.ownershipStatus!=='Confirmed')missing.push('Ownership');
    if(s.dudrichStatus==='Unknown')missing.push('Dudrich');
    if(s.coveredByContract==='Unknown')missing.push('Contract');
    if(s.planningPotential==='Unknown')missing.push('Planning');
    if(!s.nextAction||!s.nextAction.trim())missing.push('Next Action');
    const bar=`<div style="background:var(--bg3);border-radius:3px;height:6px;width:80px;display:inline-block;vertical-align:middle;margin-right:6px"><div style="background:${s.inputTier==='CLEAN'?'var(--green)':s.inputTier==='PARTIAL'?'var(--amber)':'var(--red)'};border-radius:3px;height:100%;width:${s.inputQuality||0}%"></div></div>`;
    return`<tr>
      <td class="tc">${escH(s.id)}</td>
      <td class="nc">${escH(s.name)}</td>
      <td>${bar}${s.inputQuality||0}</td>
      <td><span class="badge ${tierBadge[s.inputTier]||'b-neutral'}">${s.inputTier||'-'}</span></td>
      <td class="txt-xs" style="color:var(--red)">${missing.length?missing.join(', '):'—'}</td>
    </tr>`;
  }).join('');
  return`<div class="card">
    <div class="card-title">Layer 1 — Input Guard Summary</div>
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
      <div class="stat cyan"><div class="stat-val">${avgQ}</div><div class="stat-lbl">Avg Input Quality</div></div>
      <div class="stat green"><div class="stat-val">${counts.CLEAN||0}</div><div class="stat-lbl">CLEAN (≥80)</div></div>
      <div class="stat amber"><div class="stat-val">${counts.PARTIAL||0}</div><div class="stat-lbl">PARTIAL (60–79)</div></div>
      <div class="stat red"><div class="stat-val">${counts.INCOMPLETE||0}</div><div class="stat-lbl">INCOMPLETE (&lt;60)</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Per-Site Input Quality — Missing Fields</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>ID</th><th>Name</th><th>Quality Score</th><th>Tier</th><th>Missing / Failing Fields</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

// PANEL 5 — TOURNAMENT
function hTournamentPanel(){
  if(!sites.length)return'<div class="empty">No sites available for tournament.</div>';
  const chks=sites.map(s=>`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer"><input type="checkbox" ${hTournSel.has(s.id)?'checked':''} onchange="toggleTourn('${escA(s.id)}')"><span class="tc">${escH(s.id)}</span> ${escH(s.name)} <span class="txt-xs" style="margin-left:auto">${prioBadge(s.priority)} Score: ${s.score||0}</span></label>`).join('');
  let resultHtml='';
  if(hTournSel.size>=2){
    const contestants=sites.filter(s=>hTournSel.has(s.id));
    const ranked=[...contestants].sort(tournamentCompare);
    const pairLog=[];
    for(let i=0;i<ranked.length-1;i++){
      const a=ranked[i],b=ranked[i+1];
      let reason='Higher score';
      if(a.score===b.score){
        if((a.grossYield||0)!==(b.grossYield||0))reason='Higher gross yield';
        else if((parseInt(a.units)||0)!==(parseInt(b.units)||0))reason='More units';
        else reason='Lower ownership risk / higher planning potential';
      }
      pairLog.push(`${escH(a.id)} beats ${escH(b.id)} — ${reason}`);
    }
    const rankRows=ranked.map((s,i)=>`<tr><td style="color:var(--cyan);font-weight:700">#${i+1}</td><td class="tc">${escH(s.id)}</td><td class="nc">${escH(s.name)}</td><td class="tr">${s.score||0}</td><td class="tr">${pct(s.grossYield)}</td><td>${prioBadge(s.priority)}</td><td>${s.ownershipRisk||'?'}</td></tr>`).join('');
    resultHtml=`<hr class="sep"><div class="card-title">Tournament Result — Winner: ${escH(ranked[0].name)}</div>
      <div class="tbl-wrap"><table><thead><tr><th>Rank</th><th>ID</th><th>Name</th><th class="tr">Score</th><th class="tr">Yield</th><th>Priority</th><th>Owner Risk</th></tr></thead><tbody>${rankRows}</tbody></table></div>
      <hr class="sep"><div class="card-title">Pairwise Log</div>
      ${pairLog.map(l=>`<div class="txt-xs" style="padding:4px 0;border-bottom:1px solid var(--border)">${l}</div>`).join('')}`;
  }else if(hTournSel.size===1){resultHtml='<div class="txt-xs" style="color:var(--txt3);padding:10px 0">Select at least 2 sites to run the tournament.</div>'}
  return`<div class="card"><div class="flex jb ic mb16"><div class="card-title" style="margin:0">Tournament — Select Sites to Rank</div><button class="btn btn-ghost btn-sm" onclick="clrTourn()">Clear</button></div>${chks}${resultHtml}</div>`;
}
function toggleTourn(id){if(hTournSel.has(id))hTournSel.delete(id);else hTournSel.add(id);render()}
function clrTourn(){hTournSel.clear();render()}
