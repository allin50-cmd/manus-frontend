<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ─── PWA / mobile ────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1d4ed8" />

    <!-- iOS home-screen icon & splash -->
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FineGuard" />

    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FineGuard" />

    <!-- Microsoft Tiles (Edge / Windows) -->
    <meta name="msapplication-TileColor" content="#1d4ed8" />
    <meta name="msapplication-TileImage" content="/icons/icon.svg" />

    <!-- ─── SEO ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FineGuard – Compliance Automation for UK Accountants</title>
    <meta name="description" content="FineGuard is the Microsoft 365-native compliance automation platform for UK accountancy firms. Automated deadlines, smart workflows, full visibility." />

    <!-- Open Graph -->
    <meta property="og:title" content="FineGuard – Compliance Automation for UK Accountants" />
    <meta property="og:description" content="Automated compliance deadlines, smart M365 workflows, full practice visibility — built for UK accountancy firms." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FineGuard" />
    <meta name="twitter:description" content="M365-native compliance automation for UK accountancy firms." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
